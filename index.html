<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricScore PRO LIVE</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#065f46;
  color:white;
}
.container{padding:10px;}
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}
.scorebox{
  background:#064e3b;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
.keys{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
}
.keys button{
  width:30%;
  margin-top:10px;
  font-size:20px;
}
.big{
  font-size:30px;
  font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h2>🏏 CricScore PRO LIVE</h2>

<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<h4>Players Team 1</h4>
<div id="p1"></div>
<button onclick="addPlayer(1)">+ Add Player</button>

<h4>Players Team 2</h4>
<div id="p2"></div>
<button onclick="addPlayer(2)">+ Add Player</button>

<button onclick="createMatch()">Create Match</button>

<div id="match"></div>

</div>

<script>

// UI STATE
let score=0,wickets=0,balls=0;
let inning=1;
let players=[];
let striker=0,non=1;
let team1="",team2="";
let matchStarted=false;

// ADD PLAYER
function addPlayer(team){
  let input=document.createElement("input");
  input.placeholder="Player Name";

  if(team===1){
    document.getElementById("p1").appendChild(input);
  }else{
    document.getElementById("p2").appendChild(input);
  }
}

// DEFAULT PLAYERS
addPlayer(1);addPlayer(1);
addPlayer(2);addPlayer(2);

// UI RENDER
function render(){

if(!matchStarted) return;

document.getElementById("match").innerHTML=`
<div class="scorebox">

<b>${team1} vs ${team2}</b><br><br>

<div class="big">${score}/${wickets}</div>
Overs: ${Math.floor(balls/6)}.${balls%6}<br><br>

Striker: ${players[striker] || "-"}<br>
Non-Striker: ${players[non] || "-"}<br>
Inning: ${inning}

<div class="keys">
<button onclick="run(1)">1</button>
<button onclick="run(2)">2</button>
<button onclick="run(4)">4</button>
<button onclick="run(6)">6</button>
<button onclick="wicket()">W</button>
<button onclick="nextInning()">Next</button>
</div>

<button onclick="share()">WhatsApp</button>

</div>
`;
}

// SHARE
function share(){
let text=`${team1} vs ${team2}\nScore: ${score}/${wickets}`;
window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

</script>

<!-- 🔥 FIREBASE + LIVE SYNC -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  onSnapshot, 
  doc, 
  updateDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXAn_ewaMcYxYB5KxC2l_GSF6HORFQmZ4",
  authDomain: "cricscore-pro-a0b22.firebaseapp.com",
  projectId: "cricscore-pro-a0b22",
  storageBucket: "cricscore-pro-a0b22.firebasestorage.app",
  messagingSenderId: "658688899479",
  appId: "1:658688899479:web:ddd1ec1337f50b62012cd2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let matchId = null;

// CREATE MATCH
window.createMatch = async function(){

  team1=document.getElementById("team1").value.trim();
  team2=document.getElementById("team2").value.trim();

  if(!team1 || !team2){
    alert("Team names required");
    return;
  }

  players=[...document.querySelectorAll("#p1 input")]
  .map(x=>x.value.trim())
  .filter(x=>x!=="");

  if(players.length<2){
    alert("Min 2 players");
    return;
  }

  const docRef = await addDoc(collection(db, "matches"), {
    team1,
    team2,
    players1: players,
    score:0,
    wickets:0,
    balls:0,
    inning:1,
    striker:0,
    non:1
  });

  matchId = docRef.id;

  listenMatch();
};

// REALTIME LISTENER
function listenMatch(){

  onSnapshot(doc(db,"matches",matchId),(snap)=>{
    let data = snap.data();

    score = data.score;
    wickets = data.wickets;
    balls = data.balls;
    inning = data.inning;
    striker = data.striker;
    non = data.non;
    team1 = data.team1;
    team2 = data.team2;
    players = data.players1;

    matchStarted = true;

    render();
  });
}

// UPDATE
async function updateMatch(data){
  if(!matchId) return;
  await updateDoc(doc(db,"matches",matchId), data);
}

// RUN
window.run = function(r){
  score+=r;
  balls++;

  if(r%2===1){
    [striker,non]=[non,striker];
  }

  if(balls%6===0){
    [striker,non]=[non,striker];
  }

  updateMatch({score,balls,striker,non});
};

// WICKET
window.wicket = function(){
  wickets++;
  balls++;
  striker++;

  updateMatch({wickets,balls,striker});
};

// NEXT INNING
window.nextInning = function(){

  let p2=[...document.querySelectorAll("#p2 input")]
  .map(x=>x.value.trim())
  .filter(x=>x!=="");

  updateMatch({
    players1:p2,
    score:0,
    wickets:0,
    balls:0,
    inning:2,
    striker:0,
    non:1
  });
};

console.log("🔥 Firebase LIVE Ready");

</script>

</body>
</html>
