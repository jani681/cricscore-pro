<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CricScore Pro Max</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#0b1e35; color:white; }

header {
  background:#061425;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.container { padding:15px; }

.card {
  background:#112b4a;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
  position:relative;
}

.badge {
  position:absolute;
  top:10px;
  right:10px;
  padding:4px 8px;
  border-radius:5px;
  font-size:12px;
}

.live { background:red; }
.completed { background:gray; }
.upcoming { background:orange; }

.score { color:#00d4ff; margin-top:5px; }

.manual {
  background:#061425;
  padding:10px;
  margin-bottom:15px;
  border-radius:10px;
}

input {
  width:100%;
  padding:8px;
  margin-bottom:6px;
  border:none;
  border-radius:5px;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:5px;
  background:#00d4ff;
  cursor:pointer;
}

.back {
  margin-bottom:10px;
  width:auto;
}
</style>
</head>

<body>

<header>🏏 CricScore Pro Max</header>

<div id="app" class="container"></div>

<script>

let allMatches = [];
let manualMatches = JSON.parse(localStorage.getItem("manualMatches") || "[]");

// Add manual match
function addMatch() {
  const t1 = document.getElementById("team1").value;
  const t2 = document.getElementById("team2").value;
  const status = document.getElementById("status").value;

  if (!t1 || !t2 || !status) return alert("Fill all fields");

  manualMatches.push({
    team1:t1, team2:t2, status:status, state:"Manual"
  });

  localStorage.setItem("manualMatches", JSON.stringify(manualMatches));

  showList();
}

// Load API matches
async function loadMatches() {
  try {
    const res = await fetch("/api/matches");
    const data = await res.json();

    allMatches = [];

    data.typeMatches.forEach(type => {
      type.seriesMatches.forEach(series => {
        if (series.seriesAdWrapper) {
          series.seriesAdWrapper.matches.forEach(match => {

            allMatches.push({
              team1: match.matchInfo.team1.teamName,
              team2: match.matchInfo.team2.teamName,
              status: match.matchInfo.status,
              state: match.matchInfo.state,
              score1: match.matchScore?.team1Score?.inngs1,
              score2: match.matchScore?.team2Score?.inngs1
            });

          });
        }
      });
    });

    showList();

  } catch {
    document.getElementById("app").innerHTML = "Error loading matches";
  }
}

// Show list
function showList() {
  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="manual">
      <h3>Add Match</h3>
      <input id="team1" placeholder="Team 1">
      <input id="team2" placeholder="Team 2">
      <input id="status" placeholder="Status">
      <button onclick="addMatch()">Add Match</button>
    </div>
  `;

  const combined = [...manualMatches, ...allMatches];

  combined.forEach((m,i) => {

    let badge="UPCOMING", cls="upcoming";
    if (m.state==="In Progress") { badge="LIVE"; cls="live"; }
    else if (m.state==="Complete") { badge="RESULT"; cls="completed"; }
    else if (m.state==="Manual") { badge="LOCAL"; cls="upcoming"; }

    app.innerHTML += `
      <div class="card" onclick="showDetails(${i})">
        <div class="badge ${cls}">${badge}</div>
        <b>${m.team1} vs ${m.team2}</b>
        <div class="score">
          ${m.score1 ? `${m.score1.runs}/${m.score1.wickets} (${m.score1.overs})` : ""}
          <br>
          ${m.score2 ? `${m.score2.runs}/${m.score2.wickets} (${m.score2.overs})` : ""}
        </div>
        <div>${m.status}</div>
      </div>
    `;
  });
}

// Show details
function showDetails(i) {
  const combined = [...manualMatches, ...allMatches];
  const m = combined[i];

  document.getElementById("app").innerHTML = `
    <button class="back" onclick="showList()">⬅ Back</button>

    <h2>${m.team1} vs ${m.team2}</h2>

    <h3>Score</h3>
    <p>
      ${m.score1 ? `${m.score1.runs}/${m.score1.wickets} (${m.score1.overs})` : "No score"}
      <br>
      ${m.score2 ? `${m.score2.runs}/${m.score2.wickets} (${m.score2.overs})` : ""}
    </p>

    <h3>Status</h3>
    <p>${m.status}</p>
  `;
}

// Start
loadMatches();
setInterval(loadMatches,10000);

</script>

</body>
</html>
