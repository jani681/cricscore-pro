<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CricScore Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1e35;
      color: white;
    }

    header {
      background: #061425;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #112b4a;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 12px;
      position: relative;
    }

    .teams {
      font-size: 16px;
      font-weight: bold;
    }

    .score {
      color: #00d4ff;
      margin-top: 5px;
    }

    .status {
      font-size: 13px;
      margin-top: 5px;
      color: #aaa;
    }

    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
    }

    .live { background: red; }
    .upcoming { background: orange; }
    .completed { background: gray; }

    .manual {
      background: #061425;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #00d4ff;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>🏏 CricScore Pro</header>

<div class="container">

  <div class="manual">
    <h3>Add Match</h3>
    <input id="team1" placeholder="Team 1">
    <input id="team2" placeholder="Team 2">
    <input id="status" placeholder="Status">
    <button onclick="addMatch()">Add Match</button>
  </div>

  <div id="matches">Loading...</div>

</div>

<script>

let manualMatches = [];

// Add manual match
function addMatch() {
  const t1 = document.getElementById("team1").value;
  const t2 = document.getElementById("team2").value;
  const status = document.getElementById("status").value;

  if (!t1 || !t2 || !status) return alert("Fill all fields");

  manualMatches.push({
    team1: t1,
    team2: t2,
    status: status,
    type: "manual"
  });

  renderMatches([], manualMatches);

  document.getElementById("team1").value = "";
  document.getElementById("team2").value = "";
  document.getElementById("status").value = "";
}

// Load API matches
async function loadMatches() {
  try {
    const res = await fetch("/api/matches");
    const data = await res.json();

    let apiMatches = [];

    data.typeMatches.forEach(type => {
      type.seriesMatches.forEach(series => {
        if (series.seriesAdWrapper) {
          series.seriesAdWrapper.matches.forEach(match => {

            const score1 = match.matchScore?.team1Score?.inngs1;
            const score2 = match.matchScore?.team2Score?.inngs1;

            apiMatches.push({
              team1: match.matchInfo.team1.teamName,
              team2: match.matchInfo.team2.teamName,
              status: match.matchInfo.status,
              state: match.matchInfo.state,
              score1: score1,
              score2: score2
            });
          });
        }
      });
    });

    renderMatches(apiMatches, manualMatches);

  } catch (err) {
    document.getElementById("matches").innerHTML = "Error loading matches";
  }
}

// Render matches
function renderMatches(apiMatches, manualMatches) {
  const container = document.getElementById("matches");
  container.innerHTML = "";

  const allMatches = [...manualMatches, ...apiMatches];

  allMatches.forEach(match => {

    let badgeClass = "upcoming";
    let badgeText = "UPCOMING";

    if (match.state === "In Progress") {
      badgeClass = "live";
      badgeText = "LIVE";
    } else if (match.state === "Complete") {
      badgeClass = "completed";
      badgeText = "RESULT";
    }

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="badge ${badgeClass}">${badgeText}</div>

      <div class="teams">${match.team1} vs ${match.team2}</div>

      <div class="score">
        ${match.score1 ? `${match.score1.runs}/${match.score1.wickets} (${match.score1.overs})` : ""}
        <br>
        ${match.score2 ? `${match.score2.runs}/${match.score2.wickets} (${match.score2.overs})` : ""}
      </div>

      <div class="status">${match.status}</div>
    `;

    container.appendChild(div);
  });
}

// Auto refresh
loadMatches();
setInterval(loadMatches, 10000);

</script>

</body>
</html>
