<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CricScore VIP</title>

<style>
body {
  font-family: Arial;
  background: #064e3b;
  color: white;
  padding: 10px;
}
.card {
  background: #065f46;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}
input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 5px;
  border: none;
}
button {
  padding: 10px;
  border: none;
  border-radius: 6px;
  margin: 3px;
}
.green { background: #22c55e; }
.orange { background: orange; }
.red { background: red; color:white; }

.player {
  display:flex;
  align-items:center;
  gap:10px;
  margin:5px 0;
}
.player img {
  width:40px;
  height:40px;
  border-radius:50%;
}
</style>
</head>

<body>

<h2>🏏 CricScore VIP</h2>

<!-- ADMIN -->
<div class="card">
<h3>Admin</h3>
<input id="adminName" placeholder="Name">
<input type="file" id="adminDP">
<input id="adminWA" placeholder="WhatsApp Number">
<button class="green" onclick="saveAdmin()">Save Admin</button>
<div id="adminDisplay"></div>
</div>

<!-- CREATE MATCH -->
<div class="card">
<h3>Create Match</h3>
<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<textarea id="players1" placeholder="Team1 Players: name,wa | name,wa"></textarea>
<textarea id="players2" placeholder="Team2 Players"></textarea>

<button class="green" onclick="createMatch()">Create Match</button>
</div>

<!-- MATCHES -->
<div id="matches"></div>

<script>

let matches = JSON.parse(localStorage.getItem("matches")) || []

// ADMIN SAVE
function saveAdmin(){
  let name = document.getElementById("adminName").value
  let wa = document.getElementById("adminWA").value
  let file = document.getElementById("adminDP").files[0]

  if(!file){
    alert("DP select karo")
    return
  }

  let reader = new FileReader()
  reader.onload = function(){
    localStorage.setItem("admin", JSON.stringify({
      name, wa, dp: reader.result
    }))
    showAdmin()
  }
  reader.readAsDataURL(file)
}

// SHOW ADMIN
function showAdmin(){
  let admin = JSON.parse(localStorage.getItem("admin"))
  if(!admin) return

  document.getElementById("adminDisplay").innerHTML = `
    <img src="${admin.dp}" width="60"><br>
    ${admin.name}<br>
    <a href="https://wa.me/${admin.wa}" target="_blank" style="color:lightgreen">WhatsApp</a>
  `
}
showAdmin()

// PLAYERS PARSE
function parsePlayers(text){
  if(!text) return []
  return text.split("|").map(p=>{
    let parts = p.split(",")
    return {
      name: parts[0]?.trim() || "Player",
      wa: parts[1]?.trim() || "",
      img: "https://i.pravatar.cc/50",
      runs:0,
      wickets:0
    }
  })
}

// CREATE MATCH
function createMatch(){
  let t1 = document.getElementById("team1").value
  let t2 = document.getElementById("team2").value

  if(!t1 || !t2){
    alert("Team name required")
    return
  }

  let p1 = parsePlayers(document.getElementById("players1").value)
  let p2 = parsePlayers(document.getElementById("players2").value)

  if(p1.length == 0 || p2.length == 0){
    alert("Players add karo")
    return
  }

  let match = {
    id: Date.now(),
    t1,t2,
    p1,p2,
    score:0,
    wickets:0,
    striker:0,
    bowler:0
  }

  matches.push(match)
  save()
  render()
}

// RUN ADD
function addRun(id,run){
  let m = matches.find(x=>x.id==id)
  if(!m) return

  m.score += run
  m.p1[m.striker].runs += run

  save()
  render()
}

// WICKET
function wicket(id){
  let m = matches.find(x=>x.id==id)
  if(!m) return

  m.wickets++
  save()
  render()
}

// DELETE
function deleteMatch(id){
  matches = matches.filter(x=>x.id!=id)
  save()
  render()
}

// SAVE
function save(){
  localStorage.setItem("matches", JSON.stringify(matches))
}

// RENDER
function render(){
  let html=""

  matches.forEach(m=>{
    html += `
    <div class="card">
      <h3>${m.t1} vs ${m.t2}</h3>
      <h2>${m.score}/${m.wickets}</h2>

      <div>🏏 ${m.p1[m.striker]?.name}</div>
      <div>🎯 ${m.p2[m.bowler]?.name}</div>

      <select onchange="changeStriker(${m.id}, this.value)">
        ${m.p1.map((p,i)=>`<option ${i==m.striker?"selected":""} value="${i}">${p.name}</option>`).join("")}
      </select>

      <select onchange="changeBowler(${m.id}, this.value)">
        ${m.p2.map((p,i)=>`<option ${i==m.bowler?"selected":""} value="${i}">${p.name}</option>`).join("")}
      </select>

      <br>

      <button class="orange" onclick="addRun(${m.id},1)">1</button>
      <button class="orange" onclick="addRun(${m.id},2)">2</button>
      <button class="orange" onclick="addRun(${m.id},3)">3</button>
      <button class="orange" onclick="addRun(${m.id},4)">4</button>
      <button class="orange" onclick="addRun(${m.id},6)">6</button>
      <button class="red" onclick="wicket(${m.id})">Wicket</button>

      <h4>Team Players</h4>
      ${m.p1.map(p=>`
        <div class="player">
          <img src="${p.img}">
          ${p.name} (${p.runs})
          ${p.wa ? `<a href="https://wa.me/${p.wa}" target="_blank">📱</a>` : ""}
        </div>
      `).join("")}

      <button class="green" onclick="deleteMatch(${m.id})">Delete</button>
    </div>
    `
  })

  document.getElementById("matches").innerHTML = html
}

// CHANGE FUNCTIONS (FIXED BUG)
function changeStriker(id,val){
  let m = matches.find(x=>x.id==id)
  m.striker = Number(val)
  save()
  render()
}

function changeBowler(id,val){
  let m = matches.find(x=>x.id==id)
  m.bowler = Number(val)
  save()
  render()
}

render()

</script>

</body
