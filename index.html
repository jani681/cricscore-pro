<!DOCTYPE html>
<html>
<head>
  <title>CricScore Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0b1c2c;
      color: white;
      margin: 0;
    }
    h2 {
      text-align: center;
      padding: 15px;
      background: #06121d;
      margin: 0;
    }
    #matches {
      padding: 15px;
    }
    .card {
      background: #122b45;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>

<h2>🏏 CricScore Pro</h2>
<div id="matches">Loading...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDXAn_ewaMcYxYB5KxC2l_GSF6HORFQmZ4",
    authDomain: "cricscore-pro-a0b22.firebaseapp.com",
    projectId: "cricscore-pro-a0b22",
    storageBucket: "cricscore-pro-a0b22.firebasestorage.app",
    messagingSenderId: "658688899479",
    appId: "1:658688899479:web:ddd1ec1337f50b62012cd2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const matchesDiv = document.getElementById("matches");

  onSnapshot(collection(db, "matches"), (snapshot) => {
    let html = "";

    snapshot.forEach((doc) => {
      const data = doc.data();
      html += `
        <div class="card">
          <h3>${data.team1} vs ${data.team2}</h3>
          <p>Score: ${data.score}</p>
          <p>Status: ${data.status}</p>
        </div>
      `;
    });

    matchesDiv.innerHTML = html || "No matches found";
  }, (error) => {
    matchesDiv.innerHTML = "Error loading data";
    console.error(error);
  });

</script>

</body>
</html>
