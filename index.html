<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CricScore VIP</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<style>
body { font-family: Arial; background:#064e3b; color:white; padding:10px;}
.card { background:#065f46; padding:15px; border-radius:10px; margin-bottom:15px;}
input,textarea,select { width:100%; padding:10px; margin:5px 0; border-radius:5px;}
button { padding:10px; border:none; border-radius:6px; margin:3px;}
.green{background:#22c55e;} .orange{background:orange;} .red{background:red;color:white;}
.player{display:flex;align-items:center;gap:10px;}
.player img{width:40px;height:40px;border-radius:50%;}
</style>
</head>

<body>

<h2>🏏 CricScore VIP (Firebase)</h2>

<div class="card">
<h3>Create Match</h3>
<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">
<textarea id="players1" placeholder="Team1: name,wa | name,wa"></textarea>
<textarea id="players2" placeholder="Team2"></textarea>
<button class="green" onclick="createMatch()">Create Match</button>
</div>

<div id="matches"></div>

<script type="module">

// 🔴 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_MSG_ID",
  appId: "YOUR_APP_ID"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// PARSE PLAYERS
function parsePlayers(text){
  return text.split("|").map(p=>{
    let [name,wa] = p.split(",")
    return {
      name: name.trim(),
      wa: wa?.trim() || "",
      runs:0
    }
  })
}

// CREATE MATCH
window.createMatch = function(){
  let t1 = team1.value
  let t2 = team2.value

  let p1 = parsePlayers(players1.value)
  let p2 = parsePlayers(players2.value)

  let matchRef = push(ref(db,"matches"))

  set(matchRef,{
    t1,t2,p1,p2,
    score:0,
    wickets:0,
    striker:0,
    bowler:0
  })
}

// ADD RUN
window.addRun = function(id,run){
  let mRef = ref(db,"matches/"+id)

  update(mRef,{
    score: window.currentMatches[id].score + run
  })

  let striker = window.currentMatches[id].striker
  window.currentMatches[id].p1[striker].runs += run

  update(ref(db,"matches/"+id+"/p1"), window.currentMatches[id].p1)
}

// WICKET
window.wicket = function(id){
  let m = window.currentMatches[id]
  update(ref(db,"matches/"+id),{
    wickets: m.wickets + 1
  })
}

// DELETE
window.deleteMatch = function(id){
  remove(ref(db,"matches/"+id))
}

// REALTIME LISTENER
window.currentMatches = {}

onValue(ref(db,"matches"), snapshot=>{
  let data = snapshot.val() || {}
  window.currentMatches = data

  let html = ""

  Object.keys(data).forEach(id=>{
    let m = data[id]

    html += `
    <div class="card">
      <h3>${m.t1} vs ${m.t2}</h3>
      <h2>${m.score}/${m.wickets}</h2>

      <div>🏏 ${m.p1[m.striker]?.name || ""}</div>
      <div>🎯 ${m.p2[m.bowler]?.name || ""}</div>

      <button class="orange" onclick="addRun('${id}',1)">1</button>
      <button class="orange" onclick="addRun('${id}',2)">2</button>
      <button class="orange" onclick="addRun('${id}',3)">3</button>
      <button class="orange" onclick="addRun('${id}',4)">4</button>
      <button class="orange" onclick="addRun('${id}',6)">6</button>
      <button class="red" onclick="wicket('${id}')">Wicket</button>

      <button class="green" onclick="deleteMatch('${id}')">Delete</button>
    </div>
    `
  })

  document.getElementById("matches").innerHTML = html
})

</script>

</body>
</html>
