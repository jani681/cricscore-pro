<!DOCTYPE html>
<html>
<head>
  <title>CricScore Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #062b3d;
      color: white;
    }

    header {
      background: #041f2e;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .card {
      background: #0a3a52;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>🏏 CricScore Pro</header>

<div id="app">
  <p style="text-align:center;">Loading...</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDXAn_ewaMcYxYB5KxC2l_GSF6HORFQmZ4",
    authDomain: "cricscore-pro-a0b22.firebaseapp.com",
    projectId: "cricscore-pro-a0b22",
    storageBucket: "cricscore-pro-a0b22.firebasestorage.app",
    messagingSenderId: "658688899479",
    appId: "1:658688899479:web:ddd1ec1337f50b62012cd2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const appDiv = document.getElementById("app");

  async function loadData() {
    try {
      const querySnapshot = await getDocs(collection(db, "matches"));

      let html = "";

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        html += `
          <div class="card">
            <h2>${data.team1} vs ${data.team2}</h2>
            <p>Score: ${data.score}</p>
            <p>Status: ${data.status}</p>
          </div>
        `;
      });

      if (html === "") {
        html = "<p style='text-align:center;'>No matches found</p>";
      }

      appDiv.innerHTML = html;

    } catch (error) {
      appDiv.innerHTML = "<p style='text-align:center;color:red;'>Error loading data</p>";
      console.error(error);
    }
  }

  loadData();
</script>

</body>
</html>
