<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Cricket Step 1</title>

<style>
body{font-family:sans-serif;background:#065f46;color:white;padding:20px}
.card{background:#047857;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:10px;margin:5px;border:none;border-radius:6px}
.orange{background:#f59e0b}
.red{background:#ef4444;color:white}
.green{background:#22c55e}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

</head>

<body>

<h2>🏏 Live Cricket (Step 1)</h2>

<div class="card">
<button class="green" onclick="startMatch()">Start Match</button>
</div>

<div class="card">
<h1 id="score">0 / 0</h1>

<button class="orange" onclick="run(1)">+1</button>
<button class="orange" onclick="run(4)">+4</button>
<button class="orange" onclick="run(6)">+6</button>
<button class="red" onclick="wicket()">Wicket</button>
</div>

<script>

let match=null;

/* CREATE MATCH */
function startMatch(){
let data={
score:0,
wickets:0
};
db.ref("match").set(data);
}

/* LISTENER (LIVE SYNC) */
db.ref("match").on("value",snap=>{
match=snap.val();
if(match){
document.getElementById("score").innerText=
match.score+" / "+match.wickets;
}
});

/* RUN */
function run(r){
if(!match) return;
match.score+=r;
db.ref("match").update({score:match.score});
}

/* WICKET */
function wicket(){
if(!match) return;
match.wickets+=1;
db.ref("match").update({wickets:match.wickets});
}

</script>

</body>
</html>
