<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricScore Pro</title>

<style>
body {
  font-family: Arial;
  background: #062b3d;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.card {
  background: #0c3c54;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
}

button {
  padding: 10px;
  margin: 10px;
  border: none;
  border-radius: 5px;
  background: #00c3ff;
  color: black;
}
</style>
</head>

<body>

<h1>🏏 CricScore Pro</h1>

<button onclick="loadMatches()">🔄 Refresh</button>

<div id="matches">Loading...</div>

<script>

// 🔥 MANUAL MATCHES (ADMIN ADD)
let manualMatches = [
  {
    team1: "Baghoor XI",
    team2: "Faisalabad XI",
    score: "120/4 vs 118/8",
    status: "Baghoor XI won by 2 runs"
  }
];

// 🔥 LOAD MATCHES
async function loadMatches() {
  let container = document.getElementById("matches");
  container.innerHTML = "Loading matches...";

  try {
    // ❗ FREE PUBLIC API (NO KEY)
    let res = await fetch("https://api.cricapi.com/v1/cricScore?apikey=demo");
    let data = await res.json();

    container.innerHTML = "";

    // ✅ API DATA
    if (data && data.data && data.data.length > 0) {
      data.data.slice(0,5).forEach(match => {
        container.innerHTML += `
          <div class="card">
            <h3>${match.t1} vs ${match.t2}</h3>
            <p>${match.score || "No score yet"}</p>
            <small>${match.status}</small>
          </div>
        `;
      });
    }

    // ✅ MANUAL MATCHES ADD
    manualMatches.forEach(m => {
      container.innerHTML += `
        <div class="card">
          <h3>${m.team1} vs ${m.team2}</h3>
          <p>${m.score}</p>
          <small>${m.status}</small>
        </div>
      `;
    });

  } catch (err) {
    console.log(err);

    // ❌ ERROR FALLBACK
    container.innerHTML = `
      <div class="card">
        ⚠️ API error — showing local matches only
      </div>
    `;

    manualMatches.forEach(m => {
      container.innerHTML += `
        <div class="card">
          <h3>${m.team1} vs ${m.team2}</h3>
          <p>${m.score}</p>
          <small>${m.status}</small>
        </div>
      `;
    });
  }
}

// AUTO LOAD
loadMatches();

</script>

</body>
</html>
