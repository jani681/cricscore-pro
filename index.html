<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CricScore VIP</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#031d22;
  color:#fff;
}

.header{
  text-align:center;
  padding:20px;
}

.card{
  background:#fff;
  color:#000;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

button{
  padding:10px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.green{background:#00c853;color:#fff;}
.red{background:#d50000;color:#fff;}
.blue{background:#2962ff;color:#fff;}

input{
  width:95%;
  padding:10px;
  margin:5px;
  border-radius:6px;
  border:1px solid #ccc;
}

.score-btns button{
  width:45px;
}
</style>

</head>

<body>

<div class="header">
  <h1>🏏 CricScore VIP</h1>
  <img id="adminPic" src="https://via.placeholder.com/80" style="border-radius:50%">
  <br><br>
  <input type="file" onchange="uploadPic(event)">
</div>

<div id="matches"></div>

<div class="card">
<h3>Admin Panel</h3>

<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<input id="batsman" placeholder="Batsman">
<input id="bowler" placeholder="Bowler">
<input id="keeper" placeholder="Wicket Keeper">

<button class="green" onclick="addMatch()">Add Match</button>

</div>

<script>

// STORAGE
let matches = JSON.parse(localStorage.getItem("matches")||"[]")

function save(){
 localStorage.setItem("matches",JSON.stringify(matches))
 render()
}

// ADD MATCH
function addMatch(){
 let m={
  id:Date.now(),
  t1:team1.value,
  t2:team2.value,
  score:0,
  wickets:0,
  batsman:batsman.value,
  bowler:bowler.value,
  keeper:keeper.value
 }
 matches.push(m)
 save()
}

// SCORE UPDATE
function run(id,r){
 let m=matches.find(x=>x.id==id)
 m.score+=r
 save()
}

function wicket(id){
 let m=matches.find(x=>x.id==id)
 if(m.wickets<10) m.wickets++
 save()
}

// DELETE
function del(id){
 matches=matches.filter(x=>x.id!=id)
 save()
}

// RENDER
function render(){
 let html=""

 matches.forEach(m=>{
  html+=`
  <div class="card">
    <h3>${m.t1} vs ${m.t2}</h3>
    <h2>${m.score}/${m.wickets}</h2>

    <p><b>Batsman:</b> ${m.batsman}</p>
    <p><b>Bowler:</b> ${m.bowler}</p>
    <p><b>Keeper:</b> ${m.keeper}</p>

    <div class="score-btns">
      <button onclick="run(${m.id},1)">1</button>
      <button onclick="run(${m.id},2)">2</button>
      <button onclick="run(${m.id},3)">3</button>
      <button onclick="run(${m.id},4)">4</button>
      <button onclick="run(${m.id},6)">6</button>
      <button class="red" onclick="wicket(${m.id})">W</button>
    </div>

    <br>

    <button class="blue" onclick="share('${m.t1} vs ${m.t2} ${m.score}/${m.wickets}')">
    WhatsApp Share
    </button>

    <button class="red" onclick="del(${m.id})">Delete</button>

  </div>
  `
 })

 document.getElementById("matches").innerHTML=html
}

// SHARE
function share(text){
 window.open(`https://wa.me/?text=${encodeURIComponent(text)}`)
}

// ADMIN PIC
function uploadPic(e){
 let file=e.target.files[0]
 let reader=new FileReader()
 reader.onload=function(){
  localStorage.setItem("adminPic",reader.result)
  document.getElementById("adminPic").src=reader.result
 }
 reader.readAsDataURL(file)
}

// LOAD PIC
let pic=localStorage.getItem("adminPic")
if(pic) document.getElementById("adminPic").src=pic

render()

</script>

</body>
</html>
