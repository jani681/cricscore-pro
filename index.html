<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricScore PRO MAX</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#065f46;
  color:white;
}
.container{padding:10px;}
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:14px;
  margin:5px 0;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  font-size:16px;
}
.scorebox{
  background:#064e3b;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}
.keys{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.keys button{
  font-size:20px;
  padding:18px;
}
.big{
  font-size:30px;
  font-weight:bold;
}
.flash{
  animation:pop 0.3s;
}
@keyframes pop{
  0%{transform:scale(0.8);}
  100%{transform:scale(1);}
}
</style>

</head>
<body>

<div class="container">

<h2>🏏 CricScore PRO MAX</h2>

<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<h4>Players Team 1</h4>
<div id="p1"></div>
<button onclick="addPlayer(1)">+ Add Player</button>

<h4>Players Team 2</h4>
<div id="p2"></div>
<button onclick="addPlayer(2)">+ Add Player</button>

<button onclick="createMatch()">Create Match</button>

<div id="match"></div>

</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

// 🔥 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let matchId=null;

// STATE
let score=0,wickets=0,balls=0,inning=1;
let players=[];
let striker=0,non=1;
let team1="",team2="";
let target=0;

// ADD PLAYER
function addPlayer(team){
  let input=document.createElement("input");
  input.placeholder="Player Name";
  if(team===1) p1.appendChild(input);
  else p2.appendChild(input);
}

addPlayer(1);addPlayer(1);
addPlayer(2);addPlayer(2);

// CREATE MATCH
function createMatch(){

team1=team1Input.value.trim();
team2=team2Input.value.trim();

if(!team1 || !team2){
  alert("Team names required");
  return;
}

players=[...document.querySelectorAll("#p1 input")]
.map(x=>x.value.trim()).filter(x=>x);

if(players.length<2){
  alert("Min 2 players required");
  return;
}

// RESET
score=0; wickets=0; balls=0; inning=1;
striker=0; non=1;

// 🔥 SAVE MATCH
db.collection("matches").add({
team1, team2,
score, wickets, balls, inning,
players,
striker, non,
target
}).then(doc=>{
  matchId=doc.id;
  listenLive();
});

render();
}

// LIVE SYNC
function listenLive(){
if(!matchId) return;

db.collection("matches").doc(matchId)
.onSnapshot(doc=>{
  let d=doc.data();
  if(!d) return;

  score=d.score;
  wickets=d.wickets;
  balls=d.balls;
  inning=d.inning;
  players=d.players;
  striker=d.striker;
  non=d.non;
  target=d.target;

  render(true);
});
}

// UPDATE FIREBASE
function updateDB(){
if(!matchId) return;

db.collection("matches").doc(matchId).update({
score,wickets,balls,inning,
players,striker,non,target
});
}

// RENDER
function render(anim=false){

match.innerHTML=`
<div class="scorebox ${anim?'flash':''}">

<b>${team1} vs ${team2}</b><br><br>

<div class="big">${score}/${wickets}</div>
Overs: ${Math.floor(balls/6)}.${balls%6}<br><br>

Striker: ${players[striker]||"-"}<br>
Non-Striker: ${players[non]||"-"}<br>
Inning: ${inning}<br>
${inning==2 ? "Target: "+(target+1) : ""}

<div class="keys">
<button onclick="run(1)">1</button>
<button onclick="run(2)">2</button>
<button onclick="run(3)">3</button>
<button onclick="run(4)">4</button>
<button onclick="run(6)">6</button>
<button onclick="wicket()">W</button>
<button onclick="nextInning()">NEXT</button>
</div>

<button onclick="share()">WhatsApp</button>

</div>
`;
}

// RUN
function run(r){
score+=r;
balls++;

if(r%2===1)[striker,non]=[non,striker];
if(balls%6===0)[striker,non]=[non,striker];

checkWin();
updateDB();
}

// WICKET
function wicket(){
wickets++;
balls++;

striker++;

if(striker>=players.length){
alert("ALL OUT!");
if(inning==1) nextInning();
}

updateDB();
}

// NEXT INNING AUTO
function nextInning(){

if(inning==1){
target=score;

players=[...document.querySelectorAll("#p2 input")]
.map(x=>x.value.trim()).filter(x=>x);

score=0; wickets=0; balls=0;
inning=2; striker=0; non=1;

updateDB();
render();
}
}

// WIN CHECK
function checkWin(){
if(inning==2 && score>target){
alert(team2+" WON!");
}
}

// SHARE
function share(){
let text=`${team1} vs ${team2}
Score: ${score}/${wickets}
Overs: ${Math.floor(balls/6)}.${balls%6}`;
window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

</script>

</body>
</html>
