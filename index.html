<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CricScore VIP</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#003d3d,#001a1a);
  color:white;
}

.header {
  text-align:center;
  padding:20px;
}

.card {
  background:#ffffff10;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

input, button, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

button {
  background:#00c853;
  color:white;
  font-weight:bold;
}

.score-btns button{
  width:30%;
  margin:5px;
}

.wicket{
  background:red;
}

.highlight{
  color:yellow;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
  <h1>🏏 CricScore VIP</h1>

  <input type="file" id="dpUpload">
  <img id="adminDP" width="80" style="border-radius:50%"><br>

  <h3>Touqeer Iqbal Baghoor</h3>
  <a href="https://wa.me/923015800630" target="_blank">📱 WhatsApp</a>
</div>

<div class="card">
  <h2>Create Match</h2>

  <input id="team1" placeholder="Team 1">
  <input id="team2" placeholder="Team 2">

  <input id="players1" placeholder="Team1 Players (comma)">
  <input id="players2" placeholder="Team2 Players (comma)">

  <button onclick="createMatch()">Create Match</button>
</div>

<div id="matches"></div>

<script>

let matches = JSON.parse(localStorage.getItem("matches")) || [];

function save(){
  localStorage.setItem("matches", JSON.stringify(matches));
}

function createMatch(){
  let t1 = document.getElementById("team1").value;
  let t2 = document.getElementById("team2").value;

  let p1 = document.getElementById("players1").value.split(",");
  let p2 = document.getElementById("players2").value.split(",");

  if(!t1 || !t2) return alert("Fill teams");

  let match = {
    team1:t1,
    team2:t2,
    players1:p1,
    players2:p2,
    score:0,
    wickets:0,
    balls:0,
    striker:p1[0],
    nonStriker:p1[1],
    bowler:p2[0]
  };

  matches.push(match);
  save();
  render();
}

function addRun(i,run){
  let m = matches[i];
  m.score += run;
  m.balls++;

  if(run%2!==0){
    let temp = m.striker;
    m.striker = m.nonStriker;
    m.nonStriker = temp;
  }

  checkOver(m);
  save();
  render();
}

function wicket(i){
  let m = matches[i];
  m.wickets++;
  m.balls++;

  m.striker = "OUT";

  checkOver(m);
  save();
  render();
}

function checkOver(m){
  if(m.balls===6){
    m.balls=0;
    let temp = m.striker;
    m.striker = m.nonStriker;
    m.nonStriker = temp;
  }
}

function deleteMatch(i){
  matches.splice(i,1);
  save();
  render();
}

function render(){
  let html="";

  matches.forEach((m,i)=>{
    html+=`
    <div class="card">
      <h3>${m.team1} vs ${m.team2}</h3>
      <h2>${m.score}/${m.wickets}</h2>
      <p>Over: ${Math.floor(m.balls/6)}.${m.balls}</p>

      <p>Striker: <span class="highlight">${m.striker}</span></p>
      <p>Non-Striker: ${m.nonStriker}</p>
      <p>Bowler: ${m.bowler}</p>

      <div class="score-btns">
        <button onclick="addRun(${i},0)">0</button>
        <button onclick="addRun(${i},1)">1</button>
        <button onclick="addRun(${i},2)">2</button>
        <button onclick="addRun(${i},3)">3</button>
        <button onclick="addRun(${i},4)">4</button>
        <button onclick="addRun(${i},6)">6</button>
        <button class="wicket" onclick="wicket(${i})">Wicket</button>
      </div>

      <button onclick="deleteMatch(${i})">Delete Match</button>
    </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
}

document.getElementById("dpUpload").addEventListener("change", function(){
  let file = this.files[0];
  let reader = new FileReader();

  reader.onload = function(){
    document.getElementById("adminDP").src = reader.result;
    localStorage.setItem("dp", reader.result);
  }

  reader.readAsDataURL(file);
});

document.getElementById("adminDP").src = localStorage.getItem("dp");

render();

</script>

</body>
</html>
