<!DOCTYPE html>
<html>
<head>
  <title>CricScore PRO</title>

  <style>
    body { font-family: Arial; background:#0b5d4f; color:white; padding:10px;}
    input { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none;}
    button { padding:10px; border:none; border-radius:8px; margin:3px; cursor:pointer;}
    .btn{ background:orange;}
    .w{ background:red; color:white;}
    .card{ background:#083f35; padding:15px; margin-top:15px; border-radius:12px;}
    img{ border-radius:50%;}
    .anim{ font-size:28px; text-align:center; margin:10px;}
  </style>

</head>

<body>

<h2>🏏 CricScore PRO</h2>

<input id="adminPass" placeholder="Admin Password">
<button onclick="login()">Login</button>

<div id="adminPanel" style="display:none">

<h3>Admin Info</h3>
<input id="adminName" placeholder="Admin Name">
<input id="adminNum" placeholder="Admin WhatsApp">
<input id="adminDp" placeholder="Admin DP URL">

<h3>Create Match</h3>
<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<h4>Players Team 1</h4>
<div id="t1players"></div>
<button onclick="addPlayer('t1')">+ Add Player</button>

<h4>Players Team 2</h4>
<div id="t2players"></div>
<button onclick="addPlayer('t2')">+ Add Player</button>

<br><br>
<button onclick="createMatch()">Create Match</button>

</div>

<div id="matches"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  doc, updateDoc, getDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXAn_ewaMcYxYB5KxC2l_GSF6HORFQmZ4",
  authDomain: "cricscore-pro-a0b22.firebaseapp.com",
  projectId: "cricscore-pro-a0b22",
  storageBucket: "cricscore-pro-a0b22.appspot.com",
  messagingSenderId: "658688899479",
  appId: "1:658688899479:web:ddd1ec1337f50b62012cd2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isAdmin = false;

// LOGIN
window.login = () => {
  if(document.getElementById("adminPass").value === "1234"){
    isAdmin = true;
    document.getElementById("adminPanel").style.display="block";
  } else {
    alert("Wrong Password");
  }
};

// ADD PLAYER
window.addPlayer = (team) => {
  const div = document.createElement("div");
  div.innerHTML = `
    <input placeholder="Name">
    <input placeholder="WhatsApp">
    <input placeholder="DP URL">
  `;
  document.getElementById(team+"players").appendChild(div);
};

// CREATE MATCH (FIXED)
window.createMatch = async () => {

  const team1 = document.getElementById("team1").value;
  const team2 = document.getElementById("team2").value;

  const adminName = document.getElementById("adminName").value;
  const adminNum = document.getElementById("adminNum").value;
  const adminDp = document.getElementById("adminDp").value;

  const getPlayers = (id) => {
    const list = document.getElementById(id+"players").children;
    let arr=[];

    for(let el of list){
      let inputs = el.querySelectorAll("input");

      arr.push({
        name: inputs[0].value,
        num: inputs[1].value,
        dp: inputs[2].value
      });
    }
    return arr;
  };

  try{
    await addDoc(collection(db,"matches"),{
      team1,
      team2,
      score:0,
      wickets:0,
      players1:getPlayers("t1"),
      players2:getPlayers("t2"),
      admin:{name:adminName, num:adminNum, dp:adminDp}
    });

    alert("Match Created ✅");

  }catch(e){
    alert("Error: "+e.message);
    console.log(e);
  }
};

// SCORE UPDATE
window.updateScore = async (id,run,isW=false) => {

  const ref = doc(db,"matches",id);
  const snap = await getDoc(ref);
  let d = snap.data();

  let score = d.score + run;
  let wickets = d.wickets + (isW?1:0);

  let result="";
  if(wickets>=10) result="All Out ❌";
  if(score>=100) result="Target Achieved 🏆";

  await updateDoc(ref,{score,wickets,result});

  showAnim(run,isW);
};

// ANIMATION
window.showAnim = (run,isW)=>{
  let el = document.createElement("div");
  el.className="anim";

  if(isW) el.innerHTML="🔥 WICKET!";
  else if(run==4) el.innerHTML="🎉 FOUR!";
  else if(run==6) el.innerHTML="🚀 SIX!";
  else el.innerHTML="+"+run;

  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
};

// DELETE
window.deleteMatch = async(id)=>{
  if(confirm("Delete Match?")){
    await deleteDoc(doc(db,"matches",id));
  }
};

// WHATSAPP
window.share = (m)=>{
  let msg = `${m.team1} vs ${m.team2} Score: ${m.score}/${m.wickets}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
};

// LIVE VIEW
onSnapshot(collection(db,"matches"),snap=>{
  let html="";

  snap.forEach(docSnap=>{
    let m = docSnap.data();

    html+=`
    <div class="card">

      <h3>${m.team1} vs ${m.team2}</h3>
      <h1>${m.score}/${m.wickets}</h1>

      <img src="${m.admin?.dp || ''}" width="30"> ${m.admin?.name || ''}<br><br>

      <b>Players</b><br>
      ${m.players1.map(p=>`${p.name}`).join(", ")}<br>
      ${m.players2.map(p=>`${p.name}`).join(", ")}

      <br><br>

      <button class="btn" onclick="updateScore('${docSnap.id}',1)">1</button>
      <button class="btn" onclick="updateScore('${docSnap.id}',2)">2</button>
      <button class="btn" onclick="updateScore('${docSnap.id}',3)">3</button>
      <button class="btn" onclick="updateScore('${docSnap.id}',4)">4</button>
      <button class="btn" onclick="updateScore('${docSnap.id}',6)">6</button>
      <button class="w" onclick="updateScore('${docSnap.id}',0,true)">W</button>

      <br><br>

      <button onclick='share(${JSON.stringify(m)})'>WhatsApp</button>

      ${isAdmin ? `<button onclick="deleteMatch('${docSnap.id}')">Delete</button>` : ""}

      <br><br>${m.result || ""}

    </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
});

</script>

</body>
</html>
