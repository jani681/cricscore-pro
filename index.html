<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CricScore VIP</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#003d3d,#001a1a);
  color:white;
}

.header{text-align:center;padding:15px}

.card{
  background:#ffffff10;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

button{background:#00c853;color:white;font-weight:bold}

.score-btns button{
  width:30%;
  margin:5px;
  background:orange;
}

.wicket{background:red}

.anim{
  text-align:center;
  font-size:30px;
  margin-top:10px;
  animation:pop 0.5s;
}

@keyframes pop{
  0%{transform:scale(0)}
  100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="header">
<h2>🏏 CricScore VIP</h2>
</div>

<div class="card">
<h3>Create Match</h3>

<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<input id="players1" placeholder="Team1 Players (11 names comma)">
<input id="players2" placeholder="Team2 Players (11 names comma)">

<button onclick="createMatch()">Create Match</button>
</div>

<div id="matches"></div>

<script>

let matches = JSON.parse(localStorage.getItem("matches")) || [];

function save(){
  localStorage.setItem("matches", JSON.stringify(matches));
}

function createMatch(){
  let t1 = team1.value;
  let t2 = team2.value;

  let p1 = players1.value.split(",");
  let p2 = players2.value.split(",");

  if(p1.length < 2 || p2.length < 2){
    alert("Min 2 players zaroor daalo");
    return;
  }

  matches.push({
    team1:t1,
    team2:t2,
    p1:p1,
    p2:p2,
    score:0,
    wickets:0,
    balls:0,
    striker:p1[0],
    nonStriker:p1[1],
    bowler:p2[0],
    anim:""
  });

  save();
  render();
}

function addRun(i,run){
  let m = matches[i];
  m.score += run;
  m.balls++;

  if(run===4) m.anim="🔥 FOUR!";
  if(run===6) m.anim="💥 SIX!";
  if(run===1||run===3){
    let t=m.striker;
    m.striker=m.nonStriker;
    m.nonStriker=t;
  }

  overCheck(m);
  save();
  render();
}

function wicket(i){
  let m = matches[i];
  m.wickets++;
  m.balls++;
  m.anim="❌ WICKET!";

  m.striker="OUT";

  overCheck(m);
  save();
  render();
}

function overCheck(m){
  if(m.balls===6){
    m.balls=0;
    let t=m.striker;
    m.striker=m.nonStriker;
    m.nonStriker=t;
  }
}

function render(){
  let html="";

  matches.forEach((m,i)=>{

    let p1options = m.p1.map(p=>`<option>${p}</option>`).join("");
    let p2options = m.p2.map(p=>`<option>${p}</option>`).join("");

    html+=`
    <div class="card">
      <h3>${m.team1} vs ${m.team2}</h3>
      <h2>${m.score}/${m.wickets}</h2>
      <p>Over: ${Math.floor(m.balls/6)}.${m.balls}</p>

      <p>🏏 Striker: ${m.striker}</p>
      <p>🏏 Non-Striker: ${m.nonStriker}</p>
      <p>🎯 Bowler: ${m.bowler}</p>

      <select onchange="setStriker(${i},this.value)">
        <option>Select Striker</option>
        ${p1options}
      </select>

      <select onchange="setBowler(${i},this.value)">
        <option>Select Bowler</option>
        ${p2options}
      </select>

      <div class="score-btns">
        <button onclick="addRun(${i},1)">1</button>
        <button onclick="addRun(${i},2)">2</button>
        <button onclick="addRun(${i},3)">3</button>
        <button onclick="addRun(${i},4)">4</button>
        <button onclick="addRun(${i},6)">6</button>
        <button class="wicket" onclick="wicket(${i})">Wicket</button>
      </div>

      <div class="anim">${m.anim}</div>

      <button onclick="deleteMatch(${i})">Delete</button>
    </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
}

function setStriker(i,val){
  matches[i].striker = val;
  save();
  render();
}

function setBowler(i,val){
  matches[i].bowler = val;
  save();
  render();
}

function deleteMatch(i){
  matches.splice(i,1);
  save();
  render();
}

render();

</script>

</body>
</html>
