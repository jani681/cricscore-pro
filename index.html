<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CricScore VIP PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#004d40,#00695c);
  color:white;
}
.container{padding:15px;}
.card{
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}
input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}
button{
  padding:10px;
  border:none;
  border-radius:6px;
  margin-top:5px;
  cursor:pointer;
}
.green{background:#00c853;color:white;}
.orange{background:#ff9800;}
.red{background:red;color:white;}

.score{font-size:30px;font-weight:bold;}

.player{
  display:flex;
  align-items:center;
  margin:5px 0;
}
.player img{
  width:40px;height:40px;
  border-radius:50%;
  margin-right:10px;
}

/* animation */
.animate{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:50px;
  font-weight:bold;
  opacity:0;
  animation:pop 1s;
}
@keyframes pop{
  0%{opacity:0;transform:scale(0.5);}
  50%{opacity:1;transform:scale(1.3);}
  100%{opacity:0;}
}
</style>
</head>

<body>

<div class="container">

<h2>🏏 CricScore VIP PRO</h2>

<!-- ADMIN -->
<div class="card">
<h3>Admin</h3>
<input id="adminName" placeholder="Admin Name">
<input type="file" id="adminPic">
<input id="adminPhone" placeholder="WhatsApp Number">
<button class="green" onclick="saveAdmin()">Save Admin</button>

<div id="adminView"></div>
</div>

<!-- CREATE MATCH -->
<div class="card">
<h3>Create Match</h3>

<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<textarea id="players1" placeholder="Team1 Players (comma separated)"></textarea>
<textarea id="players2" placeholder="Team2 Players"></textarea>

<button class="green" onclick="createMatch()">Create Match</button>
</div>

<!-- MATCH -->
<div id="matchArea"></div>

</div>

<script>
let match = null;

// ADMIN SAVE
function saveAdmin(){
  const name = adminName.value;
  const phone = adminPhone.value;
  const file = adminPic.files[0];

  if(file){
    const reader = new FileReader();
    reader.onload = function(){
      const admin = {
        name,
        phone,
        pic: reader.result
      };
      localStorage.setItem("admin",JSON.stringify(admin));
      showAdmin();
    }
    reader.readAsDataURL(file);
  }
}

// SHOW ADMIN
function showAdmin(){
  const a = JSON.parse(localStorage.getItem("admin"));
  if(!a) return;
  adminView.innerHTML = `
    <img src="${a.pic}" width="80"><br>
    ${a.name}<br>
    <a href="https://wa.me/${a.phone}" target="_blank">WhatsApp</a>
  `;
}
showAdmin();

// CREATE MATCH
function createMatch(){
  const t1 = team1.value;
  const t2 = team2.value;

  if(!t1 || !t2){
    alert("Team names required");
    return;
  }

  const p1 = players1.value.split(",").map(p=>({
    name:p.trim(),
    runs:0,
    wickets:0
  }));

  const p2 = players2.value.split(",").map(p=>({
    name:p.trim(),
    runs:0,
    wickets:0
  }));

  match = {
    team1:t1,
    team2:t2,
    players1:p1,
    players2:p2,
    score:0,
    wickets:0,
    striker:p1[0]?.name,
    nonStriker:p1[1]?.name,
    bowler:p2[0]?.name
  };

  render();
}

// RENDER MATCH
function render(){
  if(!match) return;

  matchArea.innerHTML = `
  <div class="card">
    <h3>${match.team1} vs ${match.team2}</h3>
    <div class="score">${match.score}/${match.wickets}</div>

    🏏 Striker: ${match.striker}<br>
    🏏 Non-Striker: ${match.nonStriker}<br>
    🎯 Bowler: ${match.bowler}

    <select onchange="setStriker(this.value)">
      ${match.players1.map(p=>`<option>${p.name}</option>`)}
    </select>

    <select onchange="setBowler(this.value)">
      ${match.players2.map(p=>`<option>${p.name}</option>`)}
    </select>

    <div>
      <button class="orange" onclick="addRun(1)">1</button>
      <button class="orange" onclick="addRun(2)">2</button>
      <button class="orange" onclick="addRun(3)">3</button>
      <button class="orange" onclick="addRun(4)">4</button>
      <button class="orange" onclick="addRun(6)">6</button>
      <button class="red" onclick="wicket()">W</button>
      <button onclick="wide()">Wide</button>
      <button onclick="noBall()">NoBall</button>
    </div>

    <h4>Players</h4>
    ${match.players1.map(p=>`
      <div class="player">
        ${p.name} (${p.runs})
      </div>
    `).join("")}
  </div>
  `;
}

// ACTIONS
function addRun(r){
  match.score += r;
  let p = match.players1.find(x=>x.name==match.striker);
  p.runs += r;
  animate(r);
  render();
}
