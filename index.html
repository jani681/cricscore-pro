<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cricscore Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1e35;
      color: white;
    }

    header {
      background: #061425;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #112b4a;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .teams {
      font-size: 16px;
      font-weight: bold;
    }

    .status {
      font-size: 14px;
      color: #00d4ff;
      margin-top: 5px;
    }

    .manual {
      background: #061425;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #00d4ff;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    h2 {
      margin-top: 0;
    }
  </style>
</head>

<body>

<header>🏏 Cricscore Pro</header>

<div class="container">

  <!-- Manual Match Add -->
  <div class="manual">
    <h2>Add Match</h2>
    <input id="team1" placeholder="Team 1 (e.g Pakistan)">
    <input id="team2" placeholder="Team 2 (e.g India)">
    <input id="status" placeholder="Status (e.g Pakistan 120/3)">
    <button onclick="addMatch()">Add Match</button>
  </div>

  <!-- Matches -->
  <div id="matches"></div>

</div>

<script>

let manualMatches = [];

// ✅ Add manual match
function addMatch() {
  const t1 = document.getElementById("team1").value;
  const t2 = document.getElementById("team2").value;
  const status = document.getElementById("status").value;

  if (!t1 || !t2 || !status) {
    alert("Fill all fields");
    return;
  }

  manualMatches.push({
    team1: t1,
    team2: t2,
    status: status
  });

  renderMatches([], manualMatches);

  document.getElementById("team1").value = "";
  document.getElementById("team2").value = "";
  document.getElementById("status").value = "";
}

// ✅ Fetch API matches
async function loadMatches() {
  try {
    const res = await fetch("/api/matches");
    const data = await res.json();

    let apiMatches = [];

    data.typeMatches.forEach(type => {
      type.seriesMatches.forEach(series => {
        if (series.seriesAdWrapper) {
          series.seriesAdWrapper.matches.forEach(match => {
            apiMatches.push({
              team1: match.matchInfo.team1.teamName,
              team2: match.matchInfo.team2.teamName,
              status: match.matchInfo.status
            });
          });
        }
      });
    });

    renderMatches(apiMatches, manualMatches);

  } catch (err) {
    console.log(err);
  }
}

// ✅ Render both API + Manual
function renderMatches(apiMatches, manualMatches) {
  const container = document.getElementById("matches");
  container.innerHTML = "";

  const allMatches = [...manualMatches, ...apiMatches];

  allMatches.forEach(match => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="teams">${match.team1} vs ${match.team2}</div>
      <div class="status">${match.status}</div>
    `;

    container.appendChild(div);
  });
}

// Load on start
loadMatches();

</script>

</body>
</html>
