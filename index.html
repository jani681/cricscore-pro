<!DOCTYPE html>
<html>
<head>
  <title>CricScore VIP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      background: #065f46;
      color: white;
      font-family: Arial;
      padding: 10px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .card {
      background: #064e3b;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .btns button {
      width: 60px;
      margin: 5px;
      background: orange;
    }

    .w { background: red !important; }
  </style>
</head>

<body>

<h2>🏏 CricScore VIP</h2>

<!-- ADMIN LOGIN -->
<div class="card">
  <h3>Admin Login</h3>
  <input id="pass" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<!-- CREATE MATCH -->
<div class="card">
  <h3>Create Match</h3>
  <input id="team1" placeholder="Team 1">
  <input id="team2" placeholder="Team 2">
  <button onclick="createMatch()">Create Match</button>
</div>

<div id="matches"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXAn_ewaMcYxYB5KxC2l_GSF6HORFQmZ4",
  authDomain: "cricscore-pro-a0b22.firebaseapp.com",
  projectId: "cricscore-pro-a0b22",
  storageBucket: "cricscore-pro-a0b22.firebasestorage.app",
  messagingSenderId: "658688899479",
  appId: "1:658688899479:web:ddd1ec1337f50b62012cd2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isAdmin = false;

// LOGIN
window.login = function() {
  let p = document.getElementById("pass").value;
  if(p === "1234"){
    isAdmin = true;
    alert("Login Success");
  } else {
    alert("Wrong Password");
  }
};

// CHECK ADMIN
function checkAdmin(action){
  if(!isAdmin){
    alert("Admin login required");
    return;
  }
  action();
}

// CREATE MATCH
window.createMatch = async function () {
  let t1 = document.getElementById("team1").value;
  let t2 = document.getElementById("team2").value;

  if (!t1 || !t2) return alert("Enter team names");

  await addDoc(collection(db, "matches"), {
    team1: t1,
    team2: t2,
    score: 0,
    wickets: 0
  });
};

// LIVE DATA
const matchesDiv = document.getElementById("matches");

onSnapshot(collection(db, "matches"), (snapshot) => {
  matchesDiv.innerHTML = "";

  snapshot.forEach(docSnap => {
    let data = docSnap.data();
    let id = docSnap.id;

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${data.team1} vs ${data.team2}</h3>
      <h2>${data.score}/${data.wickets}</h2>

      <div class="btns">
        <button onclick="checkAdmin(()=>addRun('${id}',1))">1</button>
        <button onclick="checkAdmin(()=>addRun('${id}',2))">2</button>
        <button onclick="checkAdmin(()=>addRun('${id}',3))">3</button>
        <button onclick="checkAdmin(()=>addRun('${id}',4))">4</button>
        <button onclick="checkAdmin(()=>addRun('${id}',6))">6</button>
        <button class="w" onclick="checkAdmin(()=>addWicket('${id}'))">W</button>
      </div>
    `;

    matchesDiv.appendChild(div);
  });
});

// ADD RUN
window.addRun = async function (id, run) {
  let ref = doc(db, "matches", id);
  let snap = await getDoc(ref);
  let data = snap.data();

  await updateDoc(ref, {
    score: (data.score || 0) + run
  });
};

// ADD WICKET
window.addWicket = async function (id) {
  let ref = doc(db, "matches", id);
  let snap = await getDoc(ref);
  let data = snap.data();

  await updateDoc(ref, {
    wickets: (data.wickets || 0) + 1
  });
};

</script>

</body>
</html>
