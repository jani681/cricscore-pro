<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CricScore VIP</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#00332f;
  color:white;
}
.container{padding:15px;}
.card{
  background:#ffffff10;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}
button{
  padding:10px;
  border:none;
  border-radius:8px;
}
.green{background:#00c853;color:white;width:100%;}
.score button{
  width:30%;
  margin:5px;
  background:orange;
}
.wicket{background:red;color:white;}
</style>

</head>

<body>

<div class="container">

<h2>🏏 CricScore VIP</h2>

<div class="card">
<h3>Create Match</h3>

<input id="t1" placeholder="Team 1">
<input id="t2" placeholder="Team 2">
<input id="p1" placeholder="Team1 Players (11 names comma separated)">
<input id="p2" placeholder="Team2 Players (11 names comma separated)">

<button class="green" onclick="createMatch()">Create Match</button>
</div>

<div id="matches"></div>

</div>

<script>

let matches = [];

function createPlayers(str){
let arr = str.split(",");
if(arr.length != 11){
alert("11 players required");
return null;
}
return arr.map(n => ({name:n.trim(), runs:0, wickets:0}));
}

function createMatch(){

let t1 = document.getElementById("t1").value;
let t2 = document.getElementById("t2").value;

let p1 = createPlayers(document.getElementById("p1").value);
let p2 = createPlayers(document.getElementById("p2").value);

if(!p1 || !p2) return;

matches.push({
t1,t2,p1,p2,
score:0,
wickets:0,
striker:0,
bowler:0
});

render();
}

function run(i,val){
let m = matches[i];
m.score += val;
m.p1[m.striker].runs += val;
render();
}

function wicket(i){
let m = matches[i];

if(m.wickets >= 10){
alert("All out");
return;
}

m.wickets++;
m.p2[m.bowler].wickets++;
render();
}

function render(){

let html = "";

matches.forEach((m,i)=>{

html += `
<div class="card">

<h3>${m.t1} vs ${m.t2}</h3>
<h2>${m.score}/${m.wickets}</h2>

<p>🏏 ${m.p1[m.striker].name}</p>
<p>🎯 ${m.p2[m.bowler].name}</p>

<select onchange="matches[${i}].striker=this.value;render()">
${m.p1.map((p,idx)=>`<option value="${idx}">${p.name}</option>`).join("")}
</select>

<select onchange="matches[${i}].bowler=this.value;render()">
${m.p2.map((p,idx)=>`<option value="${idx}">${p.name}</option>`).join("")}
</select>

<div class="score">
<button onclick="run(${i},1)">1</button>
<button onclick="run(${i},2)">2</button>
<button onclick="run(${i},3)">3</button>
<button onclick="run(${i},4)">4</button>
<button onclick="run(${i},6)">6</button>
<button class="wicket" onclick="wicket(${i})">Wicket</button>
</div>

</div>
`;

});

document.getElementById("matches").innerHTML = html;
}

</script>

</body>
</html>
