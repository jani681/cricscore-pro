<script>
async function loadMatches() {
  try {
    const res = await fetch("/api/matches");
    const data = await res.json();

    document.body.innerHTML = "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
  } catch (err) {
    document.body.innerHTML = "ERROR: " + err;
    console.log(err);
  }
}

loadMatches();
</script>
