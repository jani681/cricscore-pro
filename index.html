<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#065f46;
  color:white;
}
.container{padding:10px;}
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}
.scorebox{
  background:#064e3b;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
.keys{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
}
.keys button{
  width:30%;
  margin-top:10px;
  font-size:20px;
}
.big{
  font-size:30px;
  font-weight:bold;
}
</style>

<body>

<div class="container">

<h2>🏏 CricScore PRO</h2>

<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<h4>Players Team 1</h4>
<div id="p1"></div>
<button onclick="addPlayer(1)">+ Add Player</button>

<h4>Players Team 2</h4>
<div id="p2"></div>
<button onclick="addPlayer(2)">+ Add Player</button>

<button onclick="createMatch()">Create Match</button>

<div id="match"></div>

</div>

<script>

let score=0,wickets=0,balls=0;
let inning=1;
let players=[];
let striker=0,non=1;
let team1="",team2="";
let matchStarted=false;

// ADD PLAYER
function addPlayer(team){
  let input=document.createElement("input");
  input.placeholder="Player Name";

  if(team===1){
    document.getElementById("p1").appendChild(input);
  }else{
    document.getElementById("p2").appendChild(input);
  }
}

// INIT DEFAULT PLAYERS
addPlayer(1);addPlayer(1);
addPlayer(2);addPlayer(2);

// CREATE MATCH (FIXED)
function createMatch(){

team1=document.getElementById("team1").value.trim();
team2=document.getElementById("team2").value.trim();

if(!team1 || !team2){
  alert("Team names required");
  return;
}

// GET TEAM 1 PLAYERS
players=[...document.querySelectorAll("#p1 input")]
.map(x=>x.value.trim())
.filter(x=>x!=="");

if(players.length<2){
  alert("Minimum 2 players required");
  return;
}

// RESET GAME
score=0;
wickets=0;
balls=0;
inning=1;
striker=0;
non=1;
matchStarted=true;

render();
}

// UI RENDER
function render(){

if(!matchStarted) return;

document.getElementById("match").innerHTML=`
<div class="scorebox">

<b>${team1} vs ${team2}</b><br><br>

<div class="big">${score}/${wickets}</div>
Overs: ${Math.floor(balls/6)}.${balls%6}<br><br>

Striker: ${players[striker] || "-"}<br>
Non-Striker: ${players[non] || "-"}<br>
Inning: ${inning}

<div class="keys">
<button onclick="run(1)">1</button>
<button onclick="run(2)">2</button>
<button onclick="run(4)">4</button>
<button onclick="run(6)">6</button>
<button onclick="wicket()">W</button>
<button onclick="nextInning()">Next</button>
</div>

<button onclick="share()">WhatsApp</button>

</div>
`;
}

// RUN
function run(r){

if(!matchStarted) return;

score+=r;
balls++;

// STRIKE CHANGE
if(r%2===1){
[striker,non]=[non,striker];
}

// OVER CHANGE
if(balls%6===0){
[striker,non]=[non,striker];
}

render();
}

// WICKET
function wicket(){

if(!matchStarted) return;

wickets++;
balls++;

// NEXT PLAYER
striker++;

if(striker>=players.length){
alert("All Out!");
}

render();
}

// NEXT INNING
function nextInning(){

// TEAM 2 PLAYERS
players=[...document.querySelectorAll("#p2 input")]
.map(x=>x.value.trim())
.filter(x=>x!=="");

if(players.length<2){
alert("Team 2 players required");
return;
}

score=0;
wickets=0;
balls=0;
inning=2;
striker=0;
non=1;

render();
}

// SHARE
function share(){
let text=`${team1} vs ${team2}\nScore: ${score}/${wickets}`;
window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

</script>
