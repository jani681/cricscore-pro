<!DOCTYPE html>
<html>
<head>
  <title>CricScore VIP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #021c24;
      color: white;
    }

    .header {
      background: linear-gradient(90deg,#001f27,#003f4a);
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #063544;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      position: relative;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(10px);}
      to {opacity:1; transform: translateY(0);}
    }

    .live { color:#00ff9d; }
    .local { color:gold; font-size:12px; }

    .admin {
      display:none;
      background:#03181f;
      padding:15px;
      margin:15px;
      border-radius:12px;
    }

    input,button {
      width:100%;
      padding:10px;
      margin:5px 0;
      border-radius:8px;
      border:none;
    }

    button {
      background:#00ff9d;
      font-weight:bold;
    }

    .six {
      position:absolute;
      top:10px;
      right:10px;
      color:yellow;
      font-size:20px;
      animation: pop 0.5s;
    }

    @keyframes pop {
      0% {transform:scale(0);}
      100% {transform:scale(1);}
    }

    .admin-info {
      text-align:center;
      margin:10px;
    }

    .admin-info img {
      width:80px;
      border-radius:50%;
    }
  </style>
</head>

<body>

<div class="header" onclick="unlockAdmin()">🏏 CricScore VIP</div>

<div class="admin-info">
  <img src="https://i.imgur.com/6VBx3io.png">
  <p>Admin: Touqeer Iqbal Baghoor</p>
  <a href="https://wa.me/923015800630" target="_blank">
    📲 WhatsApp Contact
  </a>
</div>

<div class="container" id="app">Loading...</div>

<div class="admin" id="adminPanel">
  <h3>Admin Panel</h3>

  <input id="key" placeholder="Admin Key">
  <input id="team1" placeholder="Team 1">
  <input id="team2" placeholder="Team 2">
  <input id="score" placeholder="Score (e.g 120/3)">
  <input id="status" placeholder="Status">

  <button onclick="addOnline()">🌐 Add Online Match</button>
  <button onclick="addLocal()">📱 Add Local Match</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXAn_ewaMcYxYB5KxC2l_GSF6HORFQmZ4",
  authDomain: "cricscore-pro-a0b22.firebaseapp.com",
  projectId: "cricscore-pro-a0b22",
  storageBucket: "cricscore-pro-a0b22.appspot.com",
  messagingSenderId: "658688899479",
  appId: "1:658688899479:web:ddd1ec1337f50b62012cd2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const appDiv = document.getElementById("app");
let localMatches = JSON.parse(localStorage.getItem("localMatches")) || [];

function render(matches) {
  appDiv.innerHTML = "";

  matches.forEach(m => {
    let six = m.score.includes("6") ? "<div class='six'>🔥 6!</div>" : "";
    let wicket = m.score.includes("/") ? "<div style='color:red'>⚡ Wicket!</div>" : "";

    appDiv.innerHTML += `
      <div class="card">
        ${six}
        <b>${m.team1} vs ${m.team2}</b>
        <p>Score: ${m.score}</p>
        ${wicket}
        <p class="live">Status: ${m.status}</p>

        <a href="https://wa.me/923015800630?text=${m.team1}%20vs%20${m.team2}%20Score:%20${m.score}" target="_blank">
          📲 Share on WhatsApp
        </a>

        ${m.local ? "<p class='local'>📱 Local Match</p>" : ""}
      </div>
    `;
  });
}

onSnapshot(collection(db, "matches"), (snap) => {
  let online = [];
  snap.forEach(d => online.push(d.data()));
  render([...online, ...localMatches]);
});

window.addOnline = async () => {
  if (key.value !== "12345") return alert("Wrong Key");

  await setDoc(doc(db,"matches",team1.value+team2.value),{
    team1:team1.value,
    team2:team2.value,
    score:score.value,
    status:status.value
  });

  alert("Online Added");
};

window.addLocal = () => {
  if (key.value !== "12345") return alert("Wrong Key");

  let m = {
    team1:team1.value,
    team2:team2.value,
    score:score.value,
    status:status.value,
    local:true
  };

  localMatches.push(m);
  localStorage.setItem("localMatches", JSON.stringify(localMatches));

  render(localMatches);
  alert("Local Saved");
};
</script>

<script>
function unlockAdmin() {
  let pass = prompt("Enter Admin Password");
  if (pass === "admin123") {
    document.getElementById("adminPanel").style.display = "block";
  }
}
</script>

</body>
</html>
