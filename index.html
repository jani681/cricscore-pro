<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricScore PRO FINAL</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#065f46;
  color:white;
}
.container{padding:10px;}
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}
.scorebox{
  background:#064e3b;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
.keys{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
}
.keys button{
  width:30%;
  margin-top:10px;
  font-size:20px;
}
.big{
  font-size:30px;
  font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h2>🏏 CricScore PRO</h2>

<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<h4>Players Team 1</h4>
<div id="p1"></div>
<button onclick="addPlayer(1)">+ Add Player</button>

<h4>Players Team 2</h4>
<div id="p2"></div>
<button onclick="addPlayer(2)">+ Add Player</button>

<button onclick="createMatch()">Create Match</button>

<div id="match"></div>

</div>

<script>

// GAME STATE
let score=0,wickets=0,balls=0;
let inning=1;
let players=[];
let striker=0,non=1;
let team1="",team2="";
let matchStarted=false;
let team1Players=[],team2Players=[];

// ADD PLAYER INPUT
function addPlayer(team){
  let input=document.createElement("input");
  input.placeholder="Player Name";

  if(team===1){
    document.getElementById("p1").appendChild(input);
  }else{
    document.getElementById("p2").appendChild(input);
  }
}

// DEFAULT PLAYERS
addPlayer(1);addPlayer(1);
addPlayer(2);addPlayer(2);

// CREATE MATCH
async function createMatch(){

team1=document.getElementById("team1").value.trim();
team2=document.getElementById("team2").value.trim();

if(!team1 || !team2){
  alert("Team names required");
  return;
}

// TEAM 1 PLAYERS
team1Players=[...document.querySelectorAll("#p1 input")]
.map(x=>x.value.trim())
.filter(x=>x!=="");

// TEAM 2 PLAYERS
team2Players=[...document.querySelectorAll("#p2 input")]
.map(x=>x.value.trim())
.filter(x=>x!=="");

if(team1Players.length<2 || team2Players.length<2){
  alert("Min 2 players per team");
  return;
}

// INIT MATCH
players=team1Players;
score=0;
wickets=0;
balls=0;
inning=1;
striker=0;
non=1;
matchStarted=true;

// SAVE FIREBASE
try{
await addDoc(collection(db,"matches"),{
team1,team2,
team1Players,
team2Players,
score:0,
wickets:0,
balls:0,
inning:1,
created:Date.now()
});
console.log("Saved");
}catch(e){
console.log(e);
}

render();
}

// RENDER UI
function render(){

if(!matchStarted) return;

document.getElementById("match").innerHTML=`
<div class="scorebox">

<b>${team1} vs ${team2}</b><br><br>

<div class="big">${score}/${wickets}</div>
Overs: ${Math.floor(balls/6)}.${balls%6}<br><br>

Striker: ${players[striker] || "-"}<br>
Non-Striker: ${players[non] || "-"}<br>
Inning: ${inning}

<div class="keys">
<button onclick="run(1)">1</button>
<button onclick="run(2)">2</button>
<button onclick="run(4)">4</button>
<button onclick="run(6)">6</button>
<button onclick="wicket()">W</button>
<button onclick="nextInning()">Next</button>
</div>

<button onclick="share()">WhatsApp</button>

</div>
`;
}

// RUN
function run(r){
if(!matchStarted) return;

score+=r;
balls++;

if(r%2===1){
[striker,non]=[non,striker];
}

if(balls%6===0){
[striker,non]=[non,striker];
}

render();
}

// WICKET
function wicket(){
if(!matchStarted) return;

wickets++;
balls++;
striker++;

if(striker>=players.length){
alert("All Out!");
}

render();
}

// NEXT INNING
function nextInning(){

if(inning===2) return;

players=team2Players;

score=0;
wickets=0;
balls=0;
inning=2;
striker=0;
non=1;

render();
}

// SHARE
function share(){
let text=`🏏 ${team1} vs ${team2}
Score: ${score}/${wickets}
Overs: ${Math.floor(balls/6)}.${balls%6}`;

window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXAn_ewaMcYxYB5KxC2l_GSF6HORFQmZ4",
  authDomain: "cricscore-pro-a0b22.firebaseapp.com",
  projectId: "cricscore-pro-a0b22",
  storageBucket: "cricscore-pro-a0b22.firebasestorage.app",
  messagingSenderId: "658688899479",
  appId: "1:658688899479:web:ddd1ec1337f50b62012cd2",
  measurementId: "G-GE58GVEEZ3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.addDoc = addDoc;
window.collection = collection;

console.log("🔥 Firebase Connected");

</script>

</body>
</html>
