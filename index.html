<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricScore PRO</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ADD PLAYER
window.addPlayer = function(team){
  let input = document.createElement("input");
  input.placeholder = "Player Name";
  document.getElementById(team).appendChild(input);
};

// CREATE MATCH
window.createMatch = async function(){
  let t1 = team1.value.trim();
  let t2 = team2.value.trim();

  if(!t1 || !t2){
    alert("Team names required");
    return;
  }

  let p1 = [...document.querySelectorAll("#t1 input")].map(i=>i.value).filter(x=>x);
  let p2 = [...document.querySelectorAll("#t2 input")].map(i=>i.value).filter(x=>x);

  if(p1.length<2 || p2.length<2){
    alert("Min 2 players required");
    return;
  }

  await addDoc(collection(db,"matches"),{
    team1:t1,
    team2:t2,
    players1:p1,
    players2:p2,

    innings:1,

    score:0,
    wickets:0,
    balls:0,

    striker:p1[0],
    nonStriker:p1[1],
    nextIndex:2,
    maxWickets:p1.length-1,

    target:0
  });

  alert("Match Created ✅");
};

// LIVE DATA
onSnapshot(collection(db,"matches"),snap=>{
  let html="";
  snap.forEach(d=>{
    let m=d.data();
    let id=d.id;

    let overs=Math.floor(m.balls/6)+"."+(m.balls%6);

    html+=`
    <div class="card fade">
      <h3>${m.team1} vs ${m.team2}</h3>
      <h2>${m.score}/${m.wickets}</h2>
      <p>Overs: ${overs}</p>
      <p>Innings: ${m.innings}</p>
      ${m.innings==2 ? `<p>Target: ${m.target}</p>` : ""}

      <p>Striker: ${m.striker}</p>
      <p>Non-Striker: ${m.nonStriker}</p>

      <div class="keys">
        <button class="run" onclick="run('${id}',1)">1</button>
        <button class="run" onclick="run('${id}',2)">2</button>
        <button class="run" onclick="run('${id}',3)">3</button>
        <button class="run" onclick="run('${id}',4)">4</button>
        <button class="run six" onclick="run('${id}',6)">6</button>
        <button class="wicket" onclick="wicket('${id}')">W</button>
      </div>

      <button onclick="share('${m.team1}','${m.team2}',${m.score},${m.wickets})">WhatsApp</button>
      <button onclick="del('${id}')">Delete</button>
    </div>`;
  });

  matches.innerHTML=html;
});

// RUN
window.run = async(id,r)=>{
  let ref = doc(db,"matches",id);
  let snap = await getDoc(ref);
  let m = snap.data();

  let newScore = m.score + r;
  let newBalls = m.balls + 1;

  let striker = m.striker;
  let nonStriker = m.nonStriker;

  if(r%2!==0){
    [striker,nonStriker]=[nonStriker,striker];
  }

  if(newBalls%6===0){
    [striker,nonStriker]=[nonStriker,striker];
  }

  await updateDoc(ref,{
    score:newScore,
    balls:newBalls,
    striker,
    nonStriker
  });
};

// WICKET + AUTO 2ND INNINGS
window.wicket = async(id)=>{
  let ref = doc(db,"matches",id);
  let snap = await getDoc(ref);
  let m = snap.data();

  // ALL OUT
  if(m.wickets>=m.maxWickets){

    // START 2ND INNINGS
    if(m.innings==1){
      await updateDoc(ref,{
        innings:2,
        target:m.score+1,
        score:0,
        wickets:0,
        balls:0,
        striker:m.players2[0],
        nonStriker:m.players2[1],
        nextIndex:2,
        maxWickets:m.players2.length-1
      });
      alert("2nd Innings Started 🔥");
      return;
    }

    alert("Match Finished 🏆");
    return;
  }

  let newPlayer = m.players1[m.nextIndex] || "Last Player";

  await updateDoc(ref,{
    wickets:m.wickets+1,
    balls:m.balls+1,
    striker:newPlayer,
    nextIndex:m.nextIndex+1
  });
};

// DELETE
window.del = async(id)=>{
  await deleteDoc(doc(db,"matches",id));
};

// WHATSAPP
window.share = (t1,t2,s,w)=>{
  let msg = `${t1} vs ${t2}\nScore: ${s}/${w}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
};
</script>

<style>
body{
  background:#065f46;
  color:white;
  font-family:Arial;
  padding:10px;
}

input{
  width:100%;
  padding:12px;
  margin:6px;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin:6px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.card{
  background:#064e3b;
  padding:12px;
  border-radius:12px;
  margin-top:12px;
}

.keys{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.run{
  background:#16a34a;
  font-size:18px;
}

.six{
  background:#f59e0b;
}

.wicket{
  background:red;
  font-size:18px;
}

.fade{
  animation:fade 0.4s;
}

@keyframes fade{
  from{opacity:0;transform:scale(0.95);}
  to{opacity:1;transform:scale(1);}
}
</style>
</head>

<body>

<h2>🏏 CricScore PRO</h2>

<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<h3>Players Team 1</h3>
<div id="t1"></div>
<button onclick="addPlayer('t1')">+ Add Player</button>

<h3>Players Team 2</h3>
<div id="t2"></div>
<button onclick="addPlayer('t2')">+ Add Player</button>

<button onclick="createMatch()">Create Match</button>

<div id="matches"></div>

</body>
</html>
