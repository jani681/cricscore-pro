<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricScore Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1e35;
  color: white;
}

header {
  background: #061425;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: #112b4a;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.teams {
  font-size: 16px;
  font-weight: bold;
}

.status {
  margin-top: 5px;
  font-size: 14px;
  color: #00d4ff;
}

.score {
  margin-top: 5px;
  font-size: 15px;
  color: #00ff9d;
}

.error {
  color: red;
  text-align: center;
}
</style>
</head>

<body>

<header>🏏 CricScore Pro</header>

<div class="container">
  <div id="matches">Loading matches...</div>
</div>

<script>

async function loadMatches() {
  const container = document.getElementById("matches");
  container.innerHTML = "Loading matches...";

  try {
    const res = await fetch("/api/matches");
    const data = await res.json();

    console.log(data);

    let html = "";

    data.typeMatches?.forEach(type => {
      type.seriesMatches?.forEach(series => {
        series.seriesAdWrapper?.matches?.forEach(match => {

          const team1 = match.matchInfo.team1.teamName;
          const team2 = match.matchInfo.team2.teamName;
          const status = match.matchInfo.status;

          // ✅ Score logic
          const score1 = match.matchScore?.team1Score?.inngs1
            ? `${match.matchScore.team1Score.inngs1.runs}/${match.matchScore.team1Score.inngs1.wickets}`
            : "N/A";

          const score2 = match.matchScore?.team2Score?.inngs1
            ? `${match.matchScore.team2Score.inngs1.runs}/${match.matchScore.team2Score.inngs1.wickets}`
            : "";

          html += `
            <div class="card">
              <div class="teams">${team1} vs ${team2}</div>
              <div class="score">${score1} ${score2}</div>
              <div class="status">${status}</div>
            </div>
          `;
        });
      });
    });

    if (html === "") {
      html = "<div class='error'>No matches found</div>";
    }

    container.innerHTML = html;

  } catch (err) {
    console.log(err);
    container.innerHTML = "<div class='error'>Error loading matches</div>";
  }
}

// Load matches
loadMatches();

</script>

</body>
</html>
