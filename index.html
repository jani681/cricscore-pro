<!DOCTYPE html>
<html>
<head>
  <title>CricScore PRO</title>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import {
      getFirestore, collection, addDoc, onSnapshot
    } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_KEY",
      authDomain: "YOUR_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.collection = collection;
    window.addDoc = addDoc;
    window.onSnapshot = onSnapshot;
  </script>

  <style>
    body{background:#0f5c4d;color:#fff;font-family:sans-serif;padding:10px}
    input,button{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none}
    button{background:#00c853;color:#fff;font-weight:bold}
    .card{background:#0c4b3e;padding:10px;margin-top:15px;border-radius:10px}
    .row{display:flex;gap:5px}
    .row input{flex:1}
  </style>
</head>

<body>

<h2>🏏 CricScore PRO</h2>

<h3>Create Match</h3>
<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<h4>Players Team 1</h4>
<div id="p1"></div>
<button onclick="addPlayer('p1')">+ Add Player</button>

<h4>Players Team 2</h4>
<div id="p2"></div>
<button onclick="addPlayer('p2')">+ Add Player</button>

<button onclick="createMatch()">Create Match</button>

<div id="matches"></div>

<script>

/* ADD PLAYER FIXED */
function addPlayer(id){
  const container = document.getElementById(id);

  const div = document.createElement("div");
  div.className = "row";

  div.innerHTML = `
    <input placeholder="Name">
    <input placeholder="WhatsApp">
    <input placeholder="DP URL">
  `;

  container.appendChild(div);
}

/* DEFAULT PLAYERS */
addPlayer('p1');
addPlayer('p1');
addPlayer('p2');
addPlayer('p2');

/* CREATE MATCH */
async function createMatch(){
  let t1 = document.getElementById("team1").value;
  let t2 = document.getElementById("team2").value;

  let players1 = [...document.querySelectorAll("#p1 .row")].map(r=>{
    let i = r.querySelectorAll("input");
    return {name:i[0].value};
  });

  let players2 = [...document.querySelectorAll("#p2 .row")].map(r=>{
    let i = r.querySelectorAll("input");
    return {name:i[0].value};
  });

  if(players1.length < 2 || players2.length < 2){
    alert("Min 2 players required");
    return;
  }

  await addDoc(collection(db,"matches"),{
    team1:t1,
    team2:t2,
    players1,
    players2,
    score:0,
    wickets:0
  });

  alert("Match Created");
}

/* LIVE MATCHES */
onSnapshot(collection(db,"matches"), snap=>{
  document.getElementById("matches").innerHTML="";
  snap.forEach(doc=>{
    let m = doc.data();

    document.getElementById("matches").innerHTML += `
      <div class="card">
        <h3>${m.team1} vs ${m.team2}</h3>
        <h2>${m.score}/${m.wickets}</h2>
      </div>
    `;
  });
});

</script>

</body>
</html>
