<!DOCTYPE html>
<html>
<head>
  <title>CricScore VIP</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0b5d4f;
      color: white;
      padding: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 5px;
      cursor: pointer;
    }

    .btn { background: orange; }
    .w { background: red; color: white; }

    .card {
      background: #0a4f43;
      padding: 15px;
      margin-top: 15px;
      border-radius: 12px;
    }

    .delete {
      background: crimson;
      color: white;
    }
  </style>
</head>

<body>

<h2>🏏 CricScore VIP</h2>

<!-- ADMIN -->
<input id="adminPass" placeholder="Admin Password">
<button onclick="login()">Login</button>

<div id="adminPanel" style="display:none">

  <h3>Create Match</h3>

  <input id="team1" placeholder="Team 1">
  <input id="team2" placeholder="Team 2">

  <input id="p1name" placeholder="Player 1 Name">
  <input id="p1num" placeholder="WhatsApp Number">
  <input id="p1dp" placeholder="DP Image URL">

  <input id="p2name" placeholder="Player 2 Name">
  <input id="p2num" placeholder="WhatsApp Number">
  <input id="p2dp" placeholder="DP Image URL">

  <button onclick="createMatch()">Create Match</button>

</div>

<div id="matches"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDXAn_ewaMcYxYB5KxC2l_GSF6HORFQmZ4",
  authDomain: "cricscore-pro-a0b22.firebaseapp.com",
  projectId: "cricscore-pro-a0b22",
  storageBucket: "cricscore-pro-a0b22.firebasestorage.app",
  messagingSenderId: "658688899479",
  appId: "1:658688899479:web:ddd1ec1337f50b62012cd2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let isAdmin = false;

function login() {
  if (document.getElementById("adminPass").value === "1234") {
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
    alert("Admin Login Success");
  }
}

// CREATE MATCH
function createMatch() {
  db.collection("matches").add({
    team1: team1.value,
    team2: team2.value,
    score: 0,
    wickets: 0,

    p1: {
      name: p1name.value,
      num: p1num.value,
      dp: p1dp.value
    },

    p2: {
      name: p2name.value,
      num: p2num.value,
      dp: p2dp.value
    }
  });
}

// SCORE UPDATE
function updateScore(id, run, isWicket=false) {
  const ref = db.collection("matches").doc(id);

  ref.get().then(doc => {
    let data = doc.data();

    let newScore = data.score + run;
    let newWickets = data.wickets + (isWicket ? 1 : 0);

    ref.update({
      score: newScore,
      wickets: newWickets
    });
  });
}

// DELETE
function deleteMatch(id) {
  if (confirm("Delete match?")) {
    db.collection("matches").doc(id).delete();
  }
}

// LIVE VIEW
db.collection("matches").onSnapshot(snapshot => {
  let html = "";

  snapshot.forEach(doc => {
    let m = doc.data();

    html += `
    <div class="card">
      <h3>${m.team1} vs ${m.team2}</h3>
      <h1>${m.score}/${m.wickets}</h1>

      <img src="${m.p1.dp}" width="40"> ${m.p1.name}
      <br>
      <img src="${m.p2.dp}" width="40"> ${m.p2.name}
      <br><br>

      <button class="btn" onclick="updateScore('${doc.id}',1)">1</button>
      <button class="btn" onclick="updateScore('${doc.id}',2)">2</button>
      <button class="btn" onclick="updateScore('${doc.id}',3)">3</button>
      <button class="btn" onclick="updateScore('${doc.id}',4)">4</button>
      <button class="btn" onclick="updateScore('${doc.id}',6)">6</button>
      <button class="w" onclick="updateScore('${doc.id}',0,true)">W</button>

      ${isAdmin ? `<br><button class="delete" onclick="deleteMatch('${doc.id}')">Delete</button>` : ""}
    </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
});
</script>

</body>
</html>
