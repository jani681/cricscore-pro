<!DOCTYPE html>
<html>
<head>
  <title>CricScore PRO</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; background:#0b5d4c; color:white; padding:10px;}
    input { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none;}
    button { padding:10px; margin:5px; border:none; border-radius:8px;}
    .run { background:orange; color:black;}
    .w { background:red; color:white;}
    .card { background:#084c3f; padding:10px; margin-top:10px; border-radius:10px;}
  </style>
</head>

<body>

<h2>🏏 CricScore PRO</h2>

<input id="pass" placeholder="Admin Password">
<button onclick="login()">Login</button>

<div id="panel" style="display:none">

<h3>Admin Info</h3>
<input id="adminName" placeholder="Admin Name">
<input id="adminNum" placeholder="WhatsApp">
<input id="adminDP" placeholder="DP URL">

<h3>Create Match</h3>
<input id="t1" placeholder="Team 1">
<input id="t2" placeholder="Team 2">

<h4>Players Team 1</h4>
<div id="p1"></div>
<button onclick="addPlayer(1)">+ Add Player</button>

<h4>Players Team 2</h4>
<div id="p2"></div>
<button onclick="addPlayer(2)">+ Add Player</button>

<br>
<button onclick="createMatch()">Create Match</button>

</div>

<div id="matches"></div>

<script>

// 🔥 Firebase config (yahan apna lagao)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function login(){
  if(document.getElementById("pass").value=="1234"){
    document.getElementById("panel").style.display="block";
  }
}

// add players
function addPlayer(team){
  let div = document.createElement("div");
  div.innerHTML = `
    <input placeholder="Name">
    <input placeholder="WhatsApp">
    <input placeholder="DP URL">
  `;
  document.getElementById(team==1?"p1":"p2").appendChild(div);
}

// get players
function getPlayers(id){
  let arr=[];
  let children=document.getElementById(id).children;
  for(let c of children){
    let inputs=c.getElementsByTagName("input");
    arr.push({
      name:inputs[0].value,
      num:inputs[1].value,
      dp:inputs[2].value
    });
  }
  return arr;
}

// create match
function createMatch(){

  let data={
    team1: t1.value,
    team2: t2.value,
    players1: getPlayers("p1"),
    players2: getPlayers("p2"),
    admin:{
      name:adminName.value,
      num:adminNum.value,
      dp:adminDP.value
    },
    score:0,
    wickets:0
  };

  db.collection("matches").add(data).then(()=>{
    alert("Match Created");
  });

}

// realtime load
db.collection("matches").onSnapshot(snap=>{
  let html="";
  snap.forEach(doc=>{
    let d=doc.data();

    html+=`
    <div class="card">
      <h3>${d.team1} vs ${d.team2}</h3>
      <h2>${d.score}/${d.wickets}</h2>

      <button class="run" onclick="score('${doc.id}',1)">1</button>
      <button class="run" onclick="score('${doc.id}',2)">2</button>
      <button class="run" onclick="score('${doc.id}',3)">3</button>
      <button class="run" onclick="score('${doc.id}',4)">4</button>
      <button class="run" onclick="score('${doc.id}',6)">6</button>
      <button class="w" onclick="wicket('${doc.id}')">W</button>

      <br><br>

      <button onclick="del('${doc.id}')">Delete</button>

      <br><br>

      <b>Admin:</b> ${d.admin?.name || ""}
      <br>
      <button onclick="whatsapp('${d.admin?.num}')">WhatsApp</button>
    </div>
    `;
  });

  document.getElementById("matches").innerHTML=html;
});

// score update
function score(id,r){
  let ref=db.collection("matches").doc(id);
  ref.get().then(doc=>{
    let d=doc.data();
    ref.update({score:d.score + r});
  });
}

// wicket
function wicket(id){
  let ref=db.collection("matches").doc(id);
  ref.get().then(doc=>{
    let d=doc.data();
    ref.update({wickets:d.wickets + 1});
  });
}

// delete
function del(id){
  db.collection("matches").doc(id).delete();
}

// whatsapp
function whatsapp(num){
  window.open("https://wa.me/"+num);
}

</script>

</body>
</html>
