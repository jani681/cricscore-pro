<!DOCTYPE html>
<html>
<head>
  <title>CricScore Ultimate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:sans-serif; background:#0b1e26; color:white; }

    .header { background:#fff; color:#000; padding:12px; text-align:center; font-weight:bold; }

    .admin-box { text-align:center; margin:10px; }
    .admin-img { width:70px; border-radius:50%; }

    .container { padding:10px; }

    .card {
      background:white; color:black;
      border-radius:10px; padding:12px;
      margin-bottom:10px; position:relative;
    }

    .score { font-size:22px; font-weight:bold; }
    .live { color:red; }

    .six { position:absolute; top:5px; right:5px; color:green; font-weight:bold; }
    .wicket { color:red; font-weight:bold; }

    .admin { background:#f5f5f5; color:black; padding:10px; margin:10px; border-radius:10px; }

    input,button { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none; }
    button { background:#00c853; color:white; font-weight:bold; }
  </style>
</head>

<body>

<div class="header">🏏 CricScore Ultimate</div>

<div class="admin-box">
  <img class="admin-img" src="https://i.imgur.com/6VBx3io.png">
  <h3>Touqeer Iqbal Baghoor</h3>
  <a target="_blank" href="https://wa.me/923015800630">📱 WhatsApp</a>
</div>

<div class="container" id="app">Loading...</div>

<div class="admin">
  <h3>Admin Panel</h3>
  <input id="team1" placeholder="Team 1">
  <input id="team2" placeholder="Team 2">
  <input id="score" placeholder="Score (120/3)">
  <input id="status" placeholder="Status">
  <input id="event" placeholder="Event (six/wicket)">
  <button onclick="addOnline()">🌐 Add Online</button>
  <button onclick="addLocal()">📱 Add Local</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXAn_ewaMcYxYB5KxC2l_GSF6HORFQmZ4",
  authDomain: "cricscore-pro-a0b22.firebaseapp.com",
  projectId: "cricscore-pro-a0b22",
  storageBucket: "cricscore-pro-a0b22.appspot.com",
  messagingSenderId: "658688899479",
  appId: "1:658688899479:web:ddd1ec1337f50b62012cd2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let localMatches = JSON.parse(localStorage.getItem("localMatches")) || [];
const appDiv = document.getElementById("app");

function render(matches){
  appDiv.innerHTML = "";

  matches.forEach(m=>{
    appDiv.innerHTML += `
      <div class="card">
        ${m.event=="six" ? '<div class="six">🔥 SIX</div>' : ''}
        <b>${m.team1} vs ${m.team2}</b>
        <p class="score">${m.score}</p>
        <p class="${m.status=='live'?'live':''}">${m.status}</p>
        ${m.event=="wicket" ? '<p class="wicket">⚡ WICKET</p>' : ''}

        <a target="_blank" href="https://wa.me/?text=${m.team1} vs ${m.team2} Score ${m.score}">
        Share WhatsApp
        </a>
      </div>
    `;
  });

  if(matches.length===0){
    appDiv.innerHTML="No matches";
  }
}

// 🔴 Firebase live
onSnapshot(collection(db,"matches"),snap=>{
  let online=[];
  snap.forEach(d=>online.push(d.data()));
  render([...online,...localMatches]);
});

// 🌐 online add
window.addOnline = async ()=>{
  await setDoc(doc(db,"matches",team1.value+team2.value),{
    team1:team1.value,
    team2:team2.value,
    score:score.value,
    status:status.value,
    event:event.value
  });
};

// 📱 local add
window.addLocal = ()=>{
  let m={
    team1:team1.value,
    team2:team2.value,
    score:score.value,
    status:status.value,
    event:event.value
  };

  localMatches.push(m);
  localStorage.setItem("localMatches",JSON.stringify(localMatches));

  render(localMatches);
};
</script>

</body>
</html>
