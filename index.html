<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricScore PRO MAX</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#065f46;
  color:white;
}
.container{padding:10px;}
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}
.scorebox{
  background:#064e3b;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
.keys button{
  width:30%;
  margin:5px;
  font-size:18px;
}
.big{
  font-size:22px;
  font-weight:bold;
}
.fade{
  animation:fade 0.3s;
}
@keyframes fade{
  from{opacity:0;transform:scale(0.9)}
  to{opacity:1;transform:scale(1)}
}
</style>

</head>
<body>

<div class="container">

<h2>🏏 CricScore PRO MAX</h2>

<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<h4>Players Team 1</h4>
<div id="p1"></div>
<button onclick="addPlayer(1)">+ Add Player</button>

<h4>Players Team 2</h4>
<div id="p2"></div>
<button onclick="addPlayer(2)">+ Add Player</button>

<button onclick="createMatch()">Create Match</button>

<div id="match"></div>

</div>

<script type="module">

// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// STATE
let matchId=null;
let score=0,wickets=0,balls=0;
let inning=1;
let players=[];
let striker=0,non=1;

// ADD PLAYER
function addPlayer(team){
  let div=document.createElement("input");
  div.placeholder="Player Name";
  if(team===1) document.getElementById("p1").appendChild(div);
  else document.getElementById("p2").appendChild(div);
}

// INIT
addPlayer(1);addPlayer(1);
addPlayer(2);addPlayer(2);

// CREATE MATCH
async function createMatch(){

let t1=document.getElementById("team1").value;
let t2=document.getElementById("team2").value;

if(!t1||!t2){
  alert("Team names required");
  return;
}

// PLAYERS
let p1=[...document.querySelectorAll("#p1 input")].map(x=>x.value);
let p2=[...document.querySelectorAll("#p2 input")].map(x=>x.value);

players = inning===1 ? p1 : p2;

// FIREBASE SAVE
try{
let docRef = await addDoc(collection(db,"matches"),{
team1:t1,
team2:t2,
score:0,
wickets:0
});
matchId=docRef.id;
}catch(e){
console.log("Firebase error",e);
}

render();
}

// RENDER
function render(){

document.getElementById("match").innerHTML=`
<div class="scorebox fade">

<div class="big">${score}/${wickets}</div>
Overs: ${Math.floor(balls/6)}.${balls%6}<br>

Striker: ${players[striker] || "-"}<br>
Non-Striker: ${players[non] || "-"}<br>
Inning: ${inning}

<div class="keys">
<button onclick="run(1)">1</button>
<button onclick="run(2)">2</button>
<button onclick="run(4)">4</button>
<button onclick="run(6)">6</button>
<button onclick="wicket()">W</button>
<button onclick="nextInning()">Next</button>
</div>

<button onclick="share()">WhatsApp</button>

</div>
`;
}

// RUN
function run(r){
score+=r;
balls++;

if(r%2===1){
[striker,non]=[non,striker];
}

if(balls%6===0){
[striker,non]=[non,striker];
}

updateDB();
render();
}

// WICKET
function wicket(){
wickets++;
balls++;

striker = striker+1;

if(wickets>=players.length-1){
alert("All Out!");
}

updateDB();
render();
}

// NEXT INNING
function nextInning(){

inning=2;
score=0;
wickets=0;
balls=0;

players=[...document.querySelectorAll("#p2 input")].map(x=>x.value);

striker=0;
non=1;

render();
}

// FIREBASE UPDATE
async function updateDB(){
if(!matchId) return;
try{
await updateDoc(doc(db,"matches",matchId),{
score:score,
wickets:wickets
});
}catch(e){}
}

// WHATSAPP
function share(){
let text=`Score: ${score}/${wickets}`;
window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

</script>

</body>
</html>
