<!DOCTYPE html>
<html>
<head>
  <title>CricScore PRO</title>

  <!-- ✅ WORKING Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body { font-family: Arial; background:#0b5d47; color:white; padding:10px;}
    input, button { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none;}
    button { background:#00c853; color:white; font-weight:bold;}
    .card { background:#0e6b52; padding:15px; margin-top:10px; border-radius:10px;}
    .btns button { width:60px; background:orange; margin:3px;}
    .w { background:red !important; }
  </style>
</head>

<body>

<h2>🏏 CricScore PRO</h2>

<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>

<div id="panel" style="display:none">

<h3>Create Match</h3>
<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<h4>Players Team 1</h4>
<div id="p1"></div>
<button onclick="addPlayer('p1')">+ Add Player</button>

<h4>Players Team 2</h4>
<div id="p2"></div>
<button onclick="addPlayer('p2')">+ Add Player</button>

<button onclick="createMatch()">Create Match</button>

</div>

<div id="matches"></div>

<script>

// 🔥 APNA FIREBASE CONFIG LAGAO
firebase.initializeApp({
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
});

const db = firebase.firestore();

// LOGIN
function login(){
  if(document.getElementById("pass").value==="1234"){
    document.getElementById("panel").style.display="block";
  } else alert("Wrong password");
}

// ADD PLAYER
function addPlayer(id){
  let div=document.createElement("div");
  div.innerHTML=`<input placeholder="Player Name">`;
  document.getElementById(id).appendChild(div);
}

// GET PLAYERS
function getPlayers(id){
  let arr=[];
  let inputs=document.getElementById(id).querySelectorAll("input");
  inputs.forEach(i=>{
    if(i.value.trim()!="") arr.push({name:i.value});
  });
  return arr;
}

// CREATE MATCH
function createMatch(){
  let t1=document.getElementById("team1").value;
  let t2=document.getElementById("team2").value;

  let p1=getPlayers("p1");

  if(!t1 || !t2 || p1.length<2){
    alert("Fill all fields (min 2 players)");
    return;
  }

  db.collection("matches").add({
    team1:t1,
    team2:t2,
    players:p1,
    score:0,
    wickets:0,
    balls:0,
    striker:0,
    nonStriker:1
  }).then(()=>{
    alert("Match Created");
  });
}

// RUN
function run(id,r){
  let ref=db.collection("matches").doc(id);
  ref.get().then(doc=>{
    let m=doc.data();

    m.score+=r;
    m.balls++;

    if(r==1 || r==3){
      let temp=m.striker;
      m.striker=m.nonStriker;
      m.nonStriker=temp;
    }

    if(m.balls%6==0){
      let temp=m.striker;
      m.striker=m.nonStriker;
      m.nonStriker=temp;
    }

    ref.update(m);
  });
}

// WICKET
function wicket(id){
  let ref=db.collection("matches").doc(id);
  ref.get().then(doc=>{
    let m=doc.data();

    if(m.wickets >= m.players.length-1){
      alert("All Out!");
      return;
    }

    m.wickets++;
    m.striker=m.wickets+1;
    m.balls++;

    ref.update(m);
  });
}

// DELETE
function del(id){
  db.collection("matches").doc(id).delete();
}

// LOAD MATCHES
db.collection("matches").onSnapshot(snap=>{
  let html="";
  snap.forEach(doc=>{
    let m=doc.data();

    html+=`
    <div class="card">
      <h3>${m.team1} vs ${m.team2}</h3>
      <h2>${m.score}/${m.wickets}</h2>
      <p>Overs: ${(m.balls/6).toFixed(1)}</p>

      <p>Striker: ${m.players[m.striker]?.name || "-"}</p>
      <p>Non-Striker: ${m.players[m.nonStriker]?.name || "-"}</p>

      <div class="btns">
        <button onclick="run('${doc.id}',1)">1</button>
        <button onclick="run('${doc.id}',2)">2</button>
        <button onclick="run('${doc.id}',3)">3</button>
        <button onclick="run('${doc.id}',4)">4</button>
        <button onclick="run('${doc.id}',6)">6</button>
        <button class="w" onclick="wicket('${doc.id}')">W</button>
      </div>

      <button onclick="del('${doc.id}')">Delete</button>
    </div>
    `;
  });

  document.getElementById("matches").innerHTML=html;
});

</script>

</body>
</html>
