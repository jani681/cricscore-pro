<script>

let matches = JSON.parse(localStorage.getItem("matches")) || [];

function save(){
  localStorage.setItem("matches", JSON.stringify(matches));
}

// SIMPLE PLAYER CREATOR (NO BUG)
function createPlayers(str){
  let names = str.split(",");
  
  if(names.length != 11){
    alert("Exactly 11 players likho!");
    return null;
  }

  return names.map(n => ({
    name: n.trim(),
    runs: 0,
    wickets: 0
  }));
}

function createMatch(){

let t1=document.getElementById("t1").value;
let t2=document.getElementById("t2").value;

let p1=createPlayers(document.getElementById("p1").value);
let p2=createPlayers(document.getElementById("p2").value);

if(!p1 || !p2) return;

matches.push({
t1,t2,
p1,p2,
score:0,
wickets:0,
striker:0,
bowler:0,
anim:""
});

save();
render();
}

// RUN ADD
function addRun(i,run){
let m=matches[i];

m.score+=run;
m.p1[m.striker].runs += run;

m.anim = run==6 ? "🔥 SIX!" : "+"+run;

save();
render();

setTimeout(()=>{
m.anim="";
render();
},1000);
}

// WICKET FIXED
function wicket(i){
let m=matches[i];

if(m.wickets >= 10){
alert("All out!");
return;
}

m.wickets++;
m.p2[m.bowler].wickets++;

m.anim="💥 WICKET!";

save();
render();

setTimeout(()=>{
m.anim="";
render();
},1000);
}

function changeStriker(i,val){
matches[i].striker=parseInt(val);
save();
render();
}

function changeBowler(i,val){
matches[i].bowler=parseInt(val);
save();
render();
}

function del(i){
matches.splice(i,1);
save();
render();
}

// UI RENDER FIXED
function render(){
let html="";

matches.forEach((m,i)=>{

html+=`
<div class="card">

<h3>${m.t1} vs ${m.t2}</h3>
<h2>${m.score}/${m.wickets}</h2>

<p>🏏 ${m.p1[m.striker].name} (${m.p1[m.striker].runs})</p>
<p>🎯 ${m.p2[m.bowler].name} (${m.p2[m.bowler].wickets})</p>

<select onchange="changeStriker(${i},this.value)">
${m.p1.map((p,idx)=>`<option value="${idx}" ${idx==m.striker?"selected":""}>${p.name}</option>`).join("")}
</select>

<select onchange="changeBowler(${i},this.value)">
${m.p2.map((p,idx)=>`<option value="${idx}" ${idx==m.bowler?"selected":""}>${p.name}</option>`).join("")}
</select>

<div class="score-btns">
<button onclick="addRun(${i},1)">1</button>
<button onclick="addRun(${i},2)">2</button>
<button onclick="addRun(${i},3)">3</button>
<button onclick="addRun(${i},4)">4</button>
<button onclick="addRun(${i},6)">6</button>
<button class="wicket" onclick="wicket(${i})">Wicket</button>
</div>

<div class="anim">${m.anim}</div>

<h4>Players</h4>

<b>${m.t1}</b>
${m.p1.map(p=>`
<div>${p.name} - Runs: ${p.runs}</div>
`).join("")}

<hr>

<b>${m.t2}</b>
${m.p2.map(p=>`
<div>${p.name} - Wickets: ${p.wickets}</div>
`).join("")}

<button class="delete" onclick="del(${i})">Delete</button>

</div>
`;

});

document.getElementById("matches").innerHTML=html;
}

render();

</script>
