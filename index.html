<!DOCTYPE html>
<html>
<head>
  <title>CricScore PRO</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import {
      getFirestore, collection, addDoc, onSnapshot,
      doc, updateDoc, deleteDoc
    } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    /* 🔥 APNA FIREBASE CONFIG */
    const firebaseConfig = {
      apiKey: "YOUR_KEY",
      authDomain: "YOUR_DOMAIN",
      projectId: "YOUR_ID",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.collection = collection;
    window.addDoc = addDoc;
    window.onSnapshot = onSnapshot;
    window.doc = doc;
    window.updateDoc = updateDoc;
    window.deleteDoc = deleteDoc;
  </script>

  <style>
    body{background:#0f5c4d;color:#fff;font-family:sans-serif;padding:10px}
    input,button{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none}
    button{background:#00c853;color:#fff;font-weight:bold}
    .card{background:#0c4b3e;padding:10px;margin-top:15px;border-radius:10px}
    .row{display:flex;gap:5px}
    .row input{flex:1}
    .btns button{width:auto;margin:3px}
    .out{background:red}
  </style>
</head>

<body>

<h2>🏏 CricScore PRO</h2>

<!-- ADMIN -->
<h3>Admin</h3>
<input id="adminName" placeholder="Admin Name">
<input id="adminWp" placeholder="WhatsApp Number">
<input id="adminDp" placeholder="DP URL">

<!-- TEAMS -->
<h3>Create Match</h3>
<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<h4>Players Team 1</h4>
<div id="p1"></div>
<button onclick="addPlayer('p1')">+ Add Player</button>

<h4>Players Team 2</h4>
<div id="p2"></div>
<button onclick="addPlayer('p2')">+ Add Player</button>

<button onclick="createMatch()">Create Match</button>

<div id="matches"></div>

<script>

function addPlayer(id){
  document.getElementById(id).innerHTML += `
    <div class="row">
      <input placeholder="Name">
      <input placeholder="WhatsApp">
      <input placeholder="DP URL">
    </div>
  `;
}

/* default 2 players */
addPlayer('p1'); addPlayer('p1');
addPlayer('p2'); addPlayer('p2');

/* CREATE MATCH */
async function createMatch(){
  let t1 = team1.value;
  let t2 = team2.value;

  let players1 = [...document.querySelectorAll("#p1 .row")].map(r=>{
    let i = r.querySelectorAll("input");
    return {name:i[0].value, wp:i[1].value, dp:i[2].value};
  });

  let players2 = [...document.querySelectorAll("#p2 .row")].map(r=>{
    let i = r.querySelectorAll("input");
    return {name:i[0].value, wp:i[1].value, dp:i[2].value};
  });

  if(players1.length < 2 || players2.length < 2){
    alert("Min 2 players required");
    return;
  }

  await addDoc(collection(db,"matches"),{
    team1:t1,
    team2:t2,
    admin:{
      name:adminName.value,
      wp:adminWp.value,
      dp:adminDp.value
    },
    players1,
    players2,
    score:0,
    wickets:0,
    balls:0,
    striker: players1[0].name,
    nonStriker: players1[1].name,
    nextIndex:2
  });
}

/* LIVE */
onSnapshot(collection(db,"matches"), snap=>{
  matches.innerHTML="";
  snap.forEach(docu=>{
    let m = docu.data();
    let id = docu.id;

    let overs = Math.floor(m.balls/6)+"."+m.balls%6;

    matches.innerHTML += `
      <div class="card">
        <h3>${m.team1} vs ${m.team2}</h3>
        <h2>${m.score}/${m.wickets}</h2>
        <p>Overs: ${overs}</p>
        <p>Striker: ${m.striker}</p>
        <p>Non: ${m.nonStriker}</p>

        <div class="btns">
          <button onclick="run('${id}',1)">1</button>
