<!DOCTYPE html>
<html>
<head>
  <title>CricScore Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #0b1e2d;
      color: white;
      padding: 10px;
    }
    h1 {
      text-align: center;
    }
    .card {
      background: #132f45;
      margin: 10px 0;
      padding: 15px;
      border-radius: 12px;
    }
    .teams {
      font-size: 18px;
      font-weight: bold;
    }
    .score {
      color: #00e5ff;
      margin-top: 5px;
    }
    .status {
      margin-top: 5px;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>

<body>

<h1>🏏 CricScore Pro</h1>

<div id="matches">Loading...</div>

<script>
async function loadMatches() {
  try {
    const res = await fetch("/api/matches");
    const data = await res.json();

    let html = "";

    data.forEach(match => {
      const team1 = match.team1?.teamName || "Team 1";
      const team2 = match.team2?.teamName || "Team 2";

      const score1 = match.team1Score?.inngs1
        ? `${match.team1Score.inngs1.runs}/${match.team1Score.inngs1.wickets} (${match.team1Score.inngs1.overs} ov)`
        : "";

      const score2 = match.team2Score?.inngs1
        ? `${match.team2Score.inngs1.runs}/${match.team2Score.inngs1.wickets} (${match.team2Score.inngs1.overs} ov)`
        : "";

      const status = match.status || "No status";

      html += `
        <div class="card">
          <div class="teams">${team1} vs ${team2}</div>
          <div class="score">${score1}</div>
          <div class="score">${score2}</div>
          <div class="status">${status}</div>
        </div>
      `;
    });

    document.getElementById("matches").innerHTML = html;

  } catch (err) {
    document.getElementById("matches").innerHTML = "Error loading matches";
  }
}

loadMatches();
</script>

</body>
</html>
