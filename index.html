<!DOCTYPE html>
<html>
<head>
<title>CricScore VIP</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#021c1e,#004445);
  color: white;
  text-align: center;
}

h1 { margin-top:20px; }

.container {
  width: 95%;
  margin: auto;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 15px;
  margin: 15px 0;
}

input, select {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  margin: 5px;
  background: green;
  color: white;
  font-weight: bold;
}

.score-btn {
  background: orange;
}

.wicket {
  background: red;
}
</style>
</head>

<body>

<h1>🏏 CricScore VIP</h1>

<div class="container">

<div class="card">
<h3>Create Match</h3>

<input id="team1" placeholder="Team 1">
<input id="team2" placeholder="Team 2">

<input id="players1" placeholder="Team1 Players (comma separated)">
<input id="players2" placeholder="Team2 Players (comma separated)">

<button onclick="createMatch()">Create Match</button>
</div>

<div id="matches"></div>

</div>

<script>

let matches = JSON.parse(localStorage.getItem("matches")) || [];

function save(){
  localStorage.setItem("matches", JSON.stringify(matches));
}

function createMatch(){
  let t1 = document.getElementById("team1").value;
  let t2 = document.getElementById("team2").value;

  let p1 = document.getElementById("players1").value.split(",");
  let p2 = document.getElementById("players2").value.split(",");

  let match = {
    team1:t1,
    team2:t2,
    players1:p1,
    players2:p2,
    score:0,
    wickets:0,
    batsman:p1[0],
    bowler:p2[0]
  };

  matches.push(match);
  save();
  render();
}

function addRun(i, run){
  matches[i].score += run;
  save();
  render();
}

function addWicket(i){
  matches[i].wickets += 1;
  save();
  render();
}

function deleteMatch(i){
  matches.splice(i,1);
  save();
  render();
}

function changeBatsman(i, val){
  matches[i].batsman = val;
  save();
}

function changeBowler(i, val){
  matches[i].bowler = val;
  save();
}

function render(){
  let html = "";

  matches.forEach((m,i)=>{

    html += `
    <div class="card">
    <h3>${m.team1} vs ${m.team2}</h3>

    <h2>${m.score}/${m.wickets}</h2>

    <p>🏏 Batsman: ${m.batsman}</p>
    <p>🎯 Bowler: ${m.bowler}</p>

    <select onchange="changeBatsman(${i},this.value)">
      ${m.players1.map(p=>`<option>${p}</option>`)}
    </select>

    <select onchange="changeBowler(${i},this.value)">
      ${m.players2.map(p=>`<option>${p}</option>`)}
    </select>

    <br>

    <button class="score-btn" onclick="addRun(${i},1)">1</button>
    <button class="score-btn" onclick="addRun(${i},2)">2</button>
    <button class="score-btn" onclick="addRun(${i},3)">3</button>
    <button class="score-btn" onclick="addRun(${i},4)">4</button>
    <button class="score-btn" onclick="addRun(${i},6)">6</button>

    <button class="wicket" onclick="addWicket(${i})">Wicket</button>

    <br><br>
    <button onclick="deleteMatch(${i})">Delete Match</button>

    </div>
    `;
  });

  document.getElementById("matches").innerHTML = html;
}

render();

</script>

</body>
</html>
