<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CricScore Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1c2c;
      color: white;
      padding: 10px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: #132f4c;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 12px;
    }

    .teams {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .score {
      font-size: 16px;
      color: #00d4ff;
      margin-bottom: 6px;
    }

    .status {
      font-size: 14px;
      color: #aaa;
    }

    .loading {
      text-align: center;
      margin-top: 50px;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h1>🏏 CricScore Pro</h1>

  <div id="matches" class="loading">Loading matches...</div>

  <script>
    async function loadMatches() {
      try {
        const res = await fetch('/api/matches');
        const data = await res.json();

        const container = document.getElementById('matches');
        container.innerHTML = '';

        const seriesList = data.typeMatches?.[0]?.seriesMatches || [];

        if (seriesList.length === 0) {
          container.innerHTML = "No matches found";
          return;
        }

        seriesList.forEach(series => {
          const match = series?.seriesAdWrapper?.matches?.[0];
          if (!match) return;

          const team1 = match.team1?.teamName || "Team 1";
          const team2 = match.team2?.teamName || "Team 2";

          const score1 = match.matchScore?.team1Score?.inngs1;
          const score2 = match.matchScore?.team2Score?.inngs1;

          const status = match.status || "No status";

          const div = document.createElement('div');
          div.className = 'card';

          div.innerHTML = `
            <div class="teams">${team1} vs ${team2}</div>

            <div class="score">
              ${score1 ? `${score1.runs}/${score1.wickets} (${score1.overs} ov)` : ''}
              <br>
              ${score2 ? `${score2.runs}/${score2.wickets} (${score2.overs} ov)` : ''}
            </div>

            <div class="status">${status}</div>
          `;

          container.appendChild(div);
        });

      } catch (error) {
        document.getElementById('matches').innerHTML = "Error loading matches";
        console.error(error);
      }
    }

    loadMatches();

    // auto refresh every 30 sec
    setInterval(loadMatches, 30000);
  </script>

</body>
</html>
