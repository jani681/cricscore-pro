<style>
.btn {
  padding: 14px;
  margin: 6px 0;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 10px;
  width: 100%;
  transition: 0.2s;
}
.btn:active {
  transform: scale(0.95);
}
.run { background:#00c853; color:white; }
.wicket { background:red; color:white; }
.big { font-size:22px; padding:16px; }

.pulse {
  animation: pulse 0.3s;
}
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let match = null;
let matchRef = null;

function getPlayers(cls){
  return [...document.querySelectorAll(cls)].map(i=>i.value.trim()).filter(v=>v);
}

window.createMatch = async () => {
  let team1 = document.getElementById("team1").value;
  let team2 = document.getElementById("team2").value;

  if(!team1 || !team2) return alert("Team names required");

  let p1 = getPlayers(".p1");
  let p2 = getPlayers(".p2");

  match = {
    team1, team2,
    players1: p1,
    players2: p2,
    score: 0,
    wickets: 0,
    balls: 0,
    striker: 0,
    nonStriker: 1,
    innings: 1,
    target: null
  };

  const docRef = await addDoc(collection(db,"matches"), match);
  matchRef = doc(db,"matches",docRef.id);

  render();
};

function swap(){
  [match.striker, match.nonStriker] = [match.nonStriker, match.striker];
}

window.addRun = async (r) => {
  match.score += r;
  match.balls++;

  if(r % 2 === 1) swap();

  checkOver();
  animate();
  await updateDoc(matchRef, match);
  render();
};

window.wicket = async () => {
  match.wickets++;
  match.balls++;

  match.striker = match.wickets + 1;

  checkOver();
  checkAllOut();

  animate();
  await updateDoc(matchRef, match);
  render();
};

function checkOver(){
  if(match.balls % 6 === 0){
    swap();
  }
}

function checkAllOut(){
  let totalPlayers = match.innings === 1 ? match.players1.length : match.players2.length;

  if(match.wickets >= totalPlayers - 1){
    if(match.innings === 1){
      match.target = match.score + 1;
      match.score = 0;
      match.wickets = 0;
      match.balls = 0;
      match.striker = 0;
      match.nonStriker = 1;
      match.innings = 2;

      alert("2nd Innings Started 🎯 Target: " + match.target);
    } else {
      alert("Match Finished 🏁");
    }
  }
}

function animate(){
  let box = document.getElementById("scoreBox");
  box.classList.add("pulse");
  setTimeout(()=>box.classList.remove("pulse"),300);
}

function overs(){
  return Math.floor(match.balls/6) + "." + (match.balls%6);
}

function strikerName(){
  let arr = match.innings === 1 ? match.players1 : match.players2;
  return arr[match.striker] || "-";
}

function nonStrikerName(){
  let arr = match.innings === 1 ? match.players1 : match.players2;
  return arr[match.nonStriker] || "-";
}

function render(){
  document.getElementById("app").innerHTML = `
  <div id="scoreBox">
    <h2>${match.team1} vs ${match.team2}</h2>
    <h1>${match.score}/${match.wickets}</h1>
    <p>Overs: ${overs()}</p>
    ${match.target ? `<p>Target: ${match.target}</p>` : ""}
    <p>Striker: ${strikerName()}</p>
    <p>Non-Striker: ${nonStrikerName()}</p>
  </div>

  <button class="btn run big" onclick="addRun(1)">+1 Run</button>
  <button class="btn run big" onclick="addRun(2)">+2 Runs</button>
  <button class="btn run big" onclick="addRun(3)">+3 Runs</button>
  <button class="btn run big" onclick="addRun(4)">FOUR</button>
  <button class="btn run big" onclick="addRun(6)">SIX</button>
  <button class="btn wicket big" onclick="wicket()">WICKET</button>

  <button class="btn" onclick="share()">Share WhatsApp</button>
  `;
}

window.share = () => {
  let text = `${match.team1} vs ${match.team2}
Score: ${match.score}/${match.wickets}
Overs: ${overs()}
${match.target ? "Target: "+match.target : ""}`;

  window.open("https://wa.me/?text=" + encodeURIComponent(text));
};
</script>
