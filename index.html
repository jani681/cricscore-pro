<!DOCTYPE html>
<html>
<head>
  <title>CricScore VIP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg,#003c3c,#0a5c5c);
      color: white;
      padding: 10px;
    }
    .box {
      background: rgba(255,255,255,0.08);
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: none;
    }
    button {
      background: #00c853;
      color: white;
      font-weight: bold;
    }
    .btns button {
      width: 18%;
      margin: 2px;
      background: orange;
    }
    .wicket {
      background: red !important;
    }
  </style>
</head>

<body>

<h2>🏏 CricScore VIP</h2>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>Enter Password</h3>
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="box">
  <h3>Create Match</h3>
  <input id="team1" placeholder="Team 1">
  <input id="team2" placeholder="Team 2">
  <input id="players1" placeholder="Team1 Players (name-number,name-number)">
  <input id="players2" placeholder="Team2 Players (name-number,name-number)">
  <button onclick="createMatch()">Create Match</button>
</div>

<div id="matches"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXAn_ewaMcYxYB5KxC2l_GSF6HORFQmZ4",
  authDomain: "cricscore-pro-a0b22.firebaseapp.com",
  projectId: "cricscore-pro-a0b22",
  storageBucket: "cricscore-pro-a0b22.firebasestorage.app",
  messagingSenderId: "658688899479",
  appId: "1:658688899479:web:ddd1ec1337f50b62012cd2",
  measurementId: "G-GE58GVEEZ3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = function() {
  let p = document.getElementById("pass").value;
  if(p === "1234") {
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
  } else {
    alert("Wrong Password");
  }
}

function parsePlayers(str){
  return str.split(",").map(p=>{
    let [name, num] = p.split("-");
    return {name:name||"", number:num||"", runs:0, wickets:0};
  });
}

window.createMatch = async function(){
  let t1 = team1.value;
  let t2 = team2.value;

  let p1 = parsePlayers(players1.value);
  let p2 = parsePlayers(players2.value);

  await addDoc(collection(db,"matches"),{
    team1:t1,
    team2:t2,
    players1:p1,
    players2:p2,
    score:0,
    wickets:0
  });

  alert("Match Created");
}

function render(matches){
  let html="";
  matches.forEach(m=>{
    html+=`
    <div class="box">
      <h3>${m.team1} vs ${m.team2}</h3>
      <h2>${m.score}/${m.wickets}</h2>

      <div class="btns">
        <button onclick="run('${m.id}',1)">1</button>
        <button onclick="run('${m.id}',2)">2</button>
        <button onclick="run('${m.id}',3)">3</button>
        <button onclick="run('${m.id}',4)">4</button>
        <button onclick="run('${m.id}',6)">6</button>
        <button class="wicket" onclick="wicket('${m.id}')">W</button>
      </div>
    </div>`;
  });
  document.getElementById("matches").innerHTML = html;
}

window.run = async function(id,r){
  let ref = doc(db,"matches",id);
  let m = current.find(x=>x.id===id);
  await updateDoc(ref,{score:m.score+r});
}

window.wicket = async function(id){
  let ref = doc(db,"matches",id);
  let m = current.find(x=>x.id===id);
  await updateDoc(ref,{wickets:m.wickets+1});
}

let current=[];

onSnapshot(collection(db,"matches"),snap=>{
  current = snap.docs.map(d=>({id:d.id,...d.data()}));
  render(current);
});

</script>

</body>
</html>
