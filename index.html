<!DOCTYPE html>
<html>
<head>
  <title>CricScore VIP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      background: #065f46;
      color: white;
      font-family: Arial;
      padding: 10px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .card {
      background: #064e3b;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .btns button {
      width: 60px;
      margin: 5px;
      background: orange;
    }

    .w { background: red !important; }
  </style>
</head>

<body>

<h2>🏏 CricScore VIP</h2>

<div class="card">
  <h3>Create Match</h3>
  <input id="team1" placeholder="Team 1">
  <input id="team2" placeholder="Team 2">
  <button onclick="createMatch()">Create Match</button>
</div>

<div id="matches"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXAn_ewaMcYxYB5KxC2l_GSF6HORFQmZ4",
  authDomain: "cricscore-pro-a0b22.firebaseapp.com",
  projectId: "cricscore-pro-a0b22",
  storageBucket: "cricscore-pro-a0b22.firebasestorage.app",
  messagingSenderId: "658688899479",
  appId: "1:658688899479:web:ddd1ec1337f50b62012cd2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const matchesDiv = document.getElementById("matches");

// CREATE MATCH
window.createMatch = async function () {
  let t1 = document.getElementById("team1").value;
  let t2 = document.getElementById("team2").value;

  if (!t1 || !t2) return alert("Enter team names");

  await addDoc(collection(db, "matches"), {
    team1: t1,
    team2: t2,
    score: 0,
    wickets: 0
  });
};

// LIVE LISTENER
onSnapshot(collection(db, "matches"), (snapshot) => {
  matchesDiv.innerHTML = "";

  snapshot.forEach(docSnap => {
    let data = docSnap.data();
    let id = docSnap.id;

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${data.team1} vs ${data.team2}</h3>
      <h2>${data.score}/${data.wickets}</h2>

      <div class="btns">
        <button onclick="addRun('${id}',1)">1</button>
        <button onclick="addRun('${id}',2)">2</button>
        <button onclick="addRun('${id}',3)">3</button>
        <button onclick="addRun('${id}',4)">4</button>
        <button onclick="addRun('${id}',6)">6</button>
        <button class="w" onclick="addWicket('${id}')">W</button>
      </div>
    `;

    matchesDiv.appendChild(div);
  });
});

// UPDATE SCORE
window.addRun = async function (id, run) {
  let ref = doc(db, "matches", id);
  let snap = await (await fetch(`https://firestore.googleapis.com/v1/projects/cricscore-pro-a0b22/databases/(default)/documents/matches/${id}`)).json();

  let data = snap.fields;
  let score = parseInt(data.score.integerValue || 0);

  await updateDoc(ref, {
    score: score + run
  });
};

window.addWicket = async function (id) {
  let ref = doc(db, "matches", id);
  let snap = await (await fetch(`https://firestore.googleapis.com/v1/projects/cricscore-pro-a0b22/databases/(default)/documents/matches/${id}`)).json();

  let data = snap.fields;
  let wickets = parseInt(data.wickets.integerValue || 0);

  await updateDoc(ref, {
    wickets: wickets + 1
  });
};
</script>

</body>
</html>
